/* мғҒм„ёлӮҙм—ӯ вҖ” мҠӨнҺҷл¶Ғкіј к°ҷмқҖ мӢӨмёЎ л¶„н• . н•ң кіөмў…мқҙ нҺҳмқҙм§Җм—җ кұём№ҳл©ҙ нҶөм§ёлЎң лӢӨмқҢ мһҘмңјлЎң лҜјлӢӨ. */
function edEstDetailPages(est,cal){
  const i=proj().info;
  const dash='<span class="dash">вҖ”</span>';
  const cell=(v,cls)=>`<td class="${cls||''}">${(v==null||v==='')?dash:v}</td>`;
  const secs=edEstSecs(est,cal).filter(s=>s.items.length);
  if(!secs.length)return[];
  const pageHead=`${edTop(edDateNo(est.date))}
    <div class="ed-hrow"><div>${edTitle('Detail.','мғҒ м„ё лӮҙ м—ӯ')}</div>
      <div class="ed-hmeta">${esc(i.name||'')}<br>${esc(edDot(est.date))}</div></div>`;
  /* мӢңкіө кІ¬м Ғм„ңлҠ” нҷ”л©ҙкіј к°ҷмқҙ мһҗмһ¬/л…ёл¬ҙ лӢЁк°ҖлҘј лӮҳлҲ  ліҙм—¬мӨҖлӢӨ. м•„мқҙн…ң кІ¬м Ғм„ңлҠ” лӢЁк°Җ н•ҳлӮҳ */
  const isCon=est.type==='construction';
  const thRow=isCon
    ?`<tr><th>н’ҲлӘ…</th><th style="width:12%">к·ңкІ©</th><th style="width:6%">мҲҳлҹү</th><th style="width:6%">лӢЁмң„</th><th style="width:10%">мһҗмһ¬л№„</th><th style="width:10%">л…ёл¬ҙл№„</th><th style="width:12%">кёҲм•Ў</th><th style="width:12%">л№„кі </th></tr>`
    :`<tr><th>н’ҲлӘ…</th><th style="width:14%">к·ңкІ©</th><th style="width:7%">мҲҳлҹү</th><th style="width:7%">лӢЁмң„</th><th style="width:11%">лӢЁк°Җ</th><th style="width:13%">кёҲм•Ў</th><th style="width:14%">л№„кі </th></tr>`;
  const rowHtml=it=>{
    const q=+it.qty||0,mp=+it.mp||0,lp=+it.lp||0,u=mp+lp;
    /* м„ёл¶ҖлӮҙм—ӯ(detail)мқҖ н’ҲлӘ… м•„лһҳ нҡҢмғү мӨ„, к·ңкІ©(spec)мқҖ м „мҡ© м№ёмңјлЎң */
    const sub=(it.detail||'').trim();
    const price=isCon
      ?`${cell(mp?numf(mp):'','n')}${cell(lp?numf(lp):'','n')}`
      :cell(u?numf(u):'','n');
    return`<tr>${cell(`${esc(it.name)}${sub?`<div class="ed-det">${esc(sub)}</div>`:''}`)}${cell(esc(it.spec||''),'etc')}${cell(q?numf(q):'','c')}${cell(esc(it.unit||''),'c')}${price}${cell(u*q?numf(u*q):'','n')}${cell(esc(it.note||''),'etc')}</tr>`;};
  const secHead=(s,cont)=>`<div class="ed-sech"><span class="sn">${String(s.num).padStart(2,'0')}</span>${esc(s.name)}${cont?' <small>(кі„мҶҚ)</small>':''}</div>`;
  /* кіөмў… н•©кі„лҠ” лӮҙм—ӯ л§Ё м•„лһҳ кІҖм • мӨ„лЎң вҖ” н—ӨлҚ” нҡҢмғү кёҖм”ЁлҠ” лҲҲм—җ м•Ҳ лқ„м–ҙм„ң мҳ®кІјлӢӨ */
  const secTotalRow=s=>isCon
    ?`<tr class="ed-strow"><td>н•©кі„</td><td></td><td></td><td></td><td class="n">${s.m?numf(s.m):''}</td><td class="n">${s.l?numf(s.l):''}</td><td class="n">${numf(s.total)}</td><td></td></tr>`
    :`<tr class="ed-strow"><td>н•©кі„</td><td></td><td></td><td></td><td></td><td class="n">${numf(s.total)}</td><td></td></tr>`;
  /* нҷ”л©ҙ л°–м—җ мӢӨм ң нҺҳмқҙм§ҖлҘј к·ёл ӨлҶ“кі  scrollHeightлЎң "лҚ” м•Ҳ л“Өм–ҙк°Ҳ л•Ңк№Ңм§Җ" мұ„мҡҙлӢӨ (мҠӨнҺҷл¶Ғкіј лҸҷмқј) */
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;left:-99999px;top:0;visibility:hidden;pointer-events:none;z-index:-1';
  const outer=document.createElement('div');
  outer.className='pv-page'; outer.style.minHeight='0'; outer.style.boxShadow='none';
  const inner=document.createElement('div'); inner.className='psheet';
  outer.appendChild(inner); stage.appendChild(outer); document.body.appendChild(stage);
  const ruler=document.createElement('div');
  ruler.style.cssText='height:100mm;position:absolute;visibility:hidden';
  stage.appendChild(ruler);
  const pxPerMm=(ruler.getBoundingClientRect().height||377.95)/100;
  ruler.remove();
  const MAXH=250*pxPerMm;            /* лӮҙмҡ© 262mm вҲ’ н•ҳлӢЁ нҡҢмӮ¬ н‘ён„° лӘ« 12mm */
  const pages=[];
  let edEl=null,pageEmpty=true;
  const overflow=()=>inner.scrollHeight>MAXH;
  const newPage=()=>{inner.innerHTML=`<div class="ed autoh">${pageHead}</div>`;edEl=inner.firstElementChild;pageEmpty=true;};
  const pushPage=()=>{if(!pageEmpty){edEl.insertAdjacentHTML('beforeend',edFoot());pages.push(inner.innerHTML);}};
  const dropSec=()=>{edEl.lastElementChild.remove();const h=edEl.lastElementChild;if(h&&h.classList.contains('ed-sech'))h.remove();};
  const addWhole=s=>{edEl.insertAdjacentHTML('beforeend',secHead(s,false)+`<table class="edt"><thead>${thRow}</thead><tbody>${s.items.map(rowHtml).join('')}${secTotalRow(s)}</tbody></table>`);};
  /* кіөмў…мқҙ н•ң нҺҳмқҙм§ҖлҘј нҶөм§ёлЎң л„ҳкёё л§ҢнҒј кёёл©ҙ н–ү лӢЁмң„лЎң лӮҳлҲ  мұ„мҡҙлӢӨ */
  const fillRows=s=>{
    let idx=0,cont=false;
    while(idx<s.items.length){
      edEl.insertAdjacentHTML('beforeend',secHead(s,cont)+`<table class="edt"><thead>${thRow}</thead><tbody></tbody></table>`);
      const tbody=edEl.lastElementChild.querySelector('tbody');
      let placed=0;
      while(idx<s.items.length){
        tbody.insertAdjacentHTML('beforeend',rowHtml(s.items[idx]));
        /* л№Ҳ нҺҳмқҙм§Җм—җм„ңлҠ” л„ҳм№ҳлҚ”лқјлҸ„ мөңмҶҢ н•ң н–үмқҖ л„ЈлҠ”лӢӨ вҖ” м•Ҳ к·ёлҹ¬л©ҙ л¬ҙн•ңлЈЁн”„ */
        if(overflow()&&!(pageEmpty&&placed===0)){tbody.lastElementChild.remove();break;}
        idx++;placed++;
      }
      if(placed>0)pageEmpty=false; else dropSec();
      /* кіөмў…мқҳ л§Ҳм§Җл§ү н–үк№Ңм§Җ л“Өм–ҙк°”мңјл©ҙ кІҖм • н•©кі„мӨ„мқ„ л¶ҷмқёлӢӨ вҖ” м•Ҳ л“Өм–ҙк°Җл©ҙ лӢӨмқҢ мһҘмңјлЎң */
      if(idx>=s.items.length&&tbody&&tbody.isConnected){
        tbody.insertAdjacentHTML('beforeend',secTotalRow(s));
        if(overflow()){
          tbody.lastElementChild.remove();
          pushPage();newPage();
          edEl.insertAdjacentHTML('beforeend',secHead(s,true)+`<table class="edt"><thead>${thRow}</thead><tbody>${secTotalRow(s)}</tbody></table>`);
          pageEmpty=false;
        }
      }
      if(idx<s.items.length){pushPage();newPage();cont=idx>0;}
    }
  };
  newPage();
  secs.forEach(s=>{
    addWhole(s);
    if(!overflow()){pageEmpty=false;return;}
    dropSec();
    if(!pageEmpty){pushPage();newPage();}   /* кұём№ҳлҠ” кіөмў…мқҖ нҶөм§ёлЎң лӢӨмқҢ мһҘмңјлЎң */
    addWhole(s);
    if(!overflow()){pageEmpty=false;return;}
    dropSec();
    fillRows(s);                            /* мғҲ нҺҳмқҙм§Җм—җлҸ„ м•Ҳ л“Өм–ҙк°ҖлҠ” кёҙ кіөмў…л§Ң л¶„н•  */
  });
  pushPage();
  stage.remove();
  return pages;
}
/* мқёмҮ„ нҸӯ кё°мӨҖмңјлЎң мӢңнҠё лӮҙмҡ© лҶ’мқҙлҘј мӢӨмёЎ(mm) вҖ” к°‘м§Җк°Җ н•ң мһҘ(273mm)м—җ л“ңлҠ”м§Җ нҷ•мқёмҡ© */
function edMeasureMm(html){
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;left:-99999px;top:0;visibility:hidden;pointer-events:none;z-index:-1';
  const outer=document.createElement('div');outer.className='pv-page';outer.style.minHeight='0';outer.style.boxShadow='none';
  const inner=document.createElement('div');inner.className='psheet';
  outer.appendChild(inner);stage.appendChild(outer);document.body.appendChild(stage);
  const ruler=document.createElement('div');ruler.style.cssText='height:100mm;position:absolute;visibility:hidden';
  stage.appendChild(ruler);
  const pxPerMm=(ruler.getBoundingClientRect().height||377.95)/100;ruler.remove();
  inner.innerHTML=html;
  const mm=inner.scrollHeight/pxPerMm;
  stage.remove();
  return mm;
}
function openEstPreview(est){
  const cal=estCalc(est);

  if(edMeasureMm(cover)>273)cover=edEstCover(est,cal,detail.length,true);

/* ===== нҷҲ лҢҖмӢңліҙл“ң вҖ” м§„н–ү мӨ‘мқё нҳ„мһҘ м „мІҙ мқјм • ===== */

/* ===== мҠӨнҺҷл¶Ғ вҖ” кІ¬м Ғм„ң н’ҲлӘ© вҶ” лӢЁк°ҖВ·л§Ҳк°җмһ¬ DB(кө¬л¶„:л§Ҳк°җмһ¬) мһҗлҸҷ л§Өм№ӯ ===== */
function collectSpecItems(sections,fin,seen,out){
  (sections||[]).forEach(sec=>(sec.items||[]).forEach(it=>{
    const name=(it.name||'').trim();if(!name)return;
    const spec=(it.spec||'').trim();
    const m=fin.find(x=>(x.name||'').trim()===name&&(x.spec||'').trim()===spec)||fin.find(x=>(x.name||'').trim()===name);
    if(!m)return;
    if(seen.has(m.id)){const e=seen.get(m.id);if(sec.name&&!e.locs.includes(sec.name))e.locs.push(sec.name);return;}
    const e={m,locs:sec.name?[sec.name]:[]};seen.set(m.id,e);out.push(e);
  }));
}
function estSpecItems(est){
  migratePrice();
  const fin=DB.priceDB.filter(x=>x.kind==='л§Ҳк°җмһ¬');
  const seen=new Map(),out=[];
  collectSpecItems(est.sections,fin,seen,out);
  return out;
}
function projSpecItems(p){
  migratePrice();
  const fin=DB.priceDB.filter(x=>x.kind==='л§Ҳк°җмһ¬');
  const seen=new Map(),out=[];
  (p.estimates||[]).forEach(e=>collectSpecItems(e.sections,fin,seen,out));
  return out;
}
function specCardPrint(e){
  const m=e.m;
  const img=m.img?`<img src="${m.img}" style="width:100%;height:100%;object-fit:cover;display:block">`:`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#B8B1A2;font-size:10px;letter-spacing:.2em">NO IMAGE</div>`;
  const row=(l,v)=>v?`<div style="display:flex;gap:10px;font-size:10px;line-height:1.6"><span style="color:#8D877B;min-width:46px;flex:none">${l}</span><span style="flex:1;color:#1D1B16">${esc(v)}</span></div>`:'';
  return`<div class="ed-card">
    <div class="im">${img}</div>
    <div style="padding:10px 12px 12px;display:flex;flex-direction:column;gap:2px">
      <div style="font-size:12px;font-weight:800;padding-bottom:6px;margin-bottom:5px;border-bottom:1px solid #E4DED1">${esc(m.name)}</div>
      ${row('м„ёл¶ҖлӮҙм—ӯ',m.detail)}${row('лёҢлһңл“ң',m.brand)}${row('к·ңкІ©',m.spec)}${row('мң„м№ҳ',e.locs.join(', '))}${row('кө¬мһ…мІҳ',m.vendor)}${+m.mp?row('к°ҖкІ©',won(m.mp)+(m.unit?' / '+m.unit:'')):''}${row('л№„кі ',m.note)}
    </div></div>`;
}
function specPages(projName,dateStr,items){
  const per=6, pages=[];
  for(let i=0;i<items.length;i+=per){
    const chunk=items.slice(i,i+per);
    pages.push(`<div class="ed">
      ${edTop(edDateNo(dateStr))}
      <div class="ed-hrow"><div>${edTitle('Spec Book.','мҠӨ нҺҷ л¶Ғ')}</div>
        <div class="ed-hmeta">${esc(projName)}<br>${esc(edDot(dateStr))}</div></div>
      <div style="border-top:1.5px solid #1D1B16;margin-top:22px"></div>
      <div class="ed-grid">${chunk.map(specCardPrint).join('')}</div>
      <div class="ed-pg">${i/per+1} / ${Math.ceil(items.length/per)}</div>
      ${edFoot()}</div>`);
  }
  return pages;
}

/* л¶„лҘҳ(м№ҙн…Ңкі лҰ¬) м§Ғм ‘ кҙҖлҰ¬ вҖ” м¶”к°ҖВ·мқҙлҰ„ліҖкІҪВ·мӮӯм ң */

  ov.innerHTML=`<div class="modal" style="width:min(440px,100%)"><h2>л¶„лҘҳ кҙҖлҰ¬</h2>

    <div style="padding:6px 22px 10px;display:flex;gap:6px"><input class="oh" id="cmNew" placeholder="мғҲ л¶„лҘҳ мқҙлҰ„ (мҳҲ: лҸ„кё°В·мң„мғқ)" style="flex:1"><button class="btn sm green" id="cmAdd">${svg(IC.plus)}м¶”к°Җ</button></div>
    <div class="modal-foot"><span></span><div class="right"><button class="btn" id="cmCancel">м·ЁмҶҢ</button><button class="btn green" id="cmSave">м ҖмһҘ</button></div></div></div>`;
  document.body.appendChild(ov);
  const listEl=ov.querySelector('#cmList');
  const draw=()=>{
    listEl.innerHTML=cur.map((x,i)=>x.del?'':`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input class="oh" data-cm="${i}" value="${esc(x.name)}" style="flex:1">

/* кІ¬м ҒВ·л°ңмЈј н’ҲлӘ© вҶ’ лӢЁк°Җ DB м—ӯм ҖмһҘ (к°ҷмқҖ н’ҲлӘ…+к·ңкІ©мқҙ мһҲмңјл©ҙ к°ҖкІ©В·лӢЁмң„л§Ң к°ұмӢ ) */
function guessKind(it){return(+it.lp>0&&!(+it.mp>0))?'мӢңкіөлӢЁк°Җ':'мӢңкіөмһҗмһ¬';}
function upsertPriceDB(e){
  migratePrice();
  const name=(e.name||'').trim();if(!name)return null;
  const spec=(e.spec||'').trim(), brand=(e.brand||'').trim();
  /* н’ҲлӘ…+к·ңкІ©мқҙ к°ҷмңјл©ҙ к°ҷмқҖ мһҗмһ¬лЎң ліёлӢӨ. лӢЁ лёҢлһңл“ңк°Җ м–‘мӘҪ лӢӨ мһҲкі  м„ңлЎң лӢӨлҘҙл©ҙ
     лі„к°ң мһҗмһ¬лӢӨ вҖ” к°ҷмқҖ лӘЁлҚёлӘ…мқҙлқјлҸ„ лҢҖлҰјкіј м—җл–јлҘҙл…ёлҠ” лӢӨлҘё л¬јкұҙмқҙлӢӨ.
     (кІ¬м Ғм„ңВ·л°ңмЈјм„ңлҠ” лёҢлһңл“ңлҘј м•Ҳ л„ҳкё°лҜҖлЎң кё°мЎҙ лҸҷмһ‘ к·ёлҢҖлЎң л§Өм№ӯлҗңлӢӨ) */
  const ex=DB.priceDB.find(x=>(x.name||'').trim()===name&&(x.spec||'').trim()===spec
    &&(!brand||!(x.brand||'').trim()||(x.brand||'').trim()===brand));
  if(ex){
    let ch=false;
    if(e.unit&&ex.unit!==e.unit){ex.unit=e.unit;ch=true;}
    if(e.mp!==''&&e.mp!=null&&+e.mp!==+(ex.mp||0)){ex.mp=e.mp;ch=true;}
    if(e.lp!==''&&e.lp!=null&&+e.lp!==+(ex.lp||0)){ex.lp=e.lp;ch=true;}
    if(e.cat&&!ex.cat){ex.cat=e.cat;ch=true;}
    /* л№Ҳ м№ёл§Ң мұ„мҡҙлӢӨ вҖ” DBм—җ м •лҰ¬н•ҙл‘” к°’мқ„ нҳ„мһҘ лҚ°мқҙн„°лЎң лҚ®м–ҙм“°м§Җ м•ҠлҠ”лӢӨ */
    ['brand','img','note','vendor','detail'].forEach(k=>{if(e[k]&&!ex[k]){ex[k]=e[k];ch=true;}});
    /* л§Ҳк°җмһ¬лҠ” лӘ…мӢң м§Җм •мқҙлқј guessKind м¶”мёЎліҙлӢӨ мҡ°м„ н•ңлӢӨ */
    if(e.kind==='л§Ҳк°җмһ¬'&&ex.kind!=='л§Ҳк°җмһ¬'){ex.kind='л§Ҳк°җмһ¬';ch=true;}
    return ch?'updated':'same';
  }
  DB.priceDB.push({id:uid(),kind:e.kind||guessKind(e),cat:e.cat||'',name,spec,unit:e.unit||'',mp:e.mp||'',lp:e.lp||'',brand,vendor:e.vendor||'',note:e.note||'',detail:e.detail||'',img:e.img||''});
  return 'added';
}
/* нҳ„мһҘ л§Ҳк°җмһ¬ вҶ’ мһҗмһ¬DB. к·ёлЈ№лӘ…мқҙ л¶„лҘҳк°Җ лҗңлӢӨ.
   мҲҳлҹүВ·мғҒнғңВ·кіөм •мқҖ нҳ„мһҘл§ҲлӢӨ лӢӨлҘё к°’мқҙлқј DBлЎң л„ҳкё°м§Җ м•ҠлҠ”лӢӨ. */
function saveMaterialsToPriceDB(items){
  const list=(items||[]).filter(m=>(m.name||'').trim());
  if(!list.length){toast('м ҖмһҘн•  л§Ҳк°җмһ¬к°Җ м—ҶмҠөлӢҲлӢӨ');return;}
  let a=0,u=0;
  list.forEach(m=>{
    const r=upsertPriceDB({kind:'л§Ҳк°җмһ¬',cat:m.group||'',name:m.name,spec:m.spec,unit:m.unit,
      mp:m.price,lp:'',brand:m.brand,img:m.img,note:m.note,detail:m.detail});
    if(r==='added')a++;else if(r==='updated')u++;
  });
  if(!a&&!u){toast('мһҗмһ¬DBм—җ мқҙлҜё лӘЁл‘җ л“ұлЎқлҗҳм–ҙ мһҲмҠөлӢҲлӢӨ');return;}
  save();
  toast('мһҗмһ¬DB м ҖмһҘ: '+[a?`мӢ к·ң ${a}к°ң`:'',u?`к°ұмӢ  ${u}к°ң`:''].filter(Boolean).join(' В· '));
}

/* кёҲм•Ў вҶ’ н•ңкёҖ (мҳҲ: 101200000 вҶ’ мқјм–өл°ұмқҙмӢӯл§Ң) */
function wonHangul(n){
  n=Math.floor(+n||0); if(!n)return'мҳҒ';
  const d=['','мқј','мқҙ','мӮј','мӮ¬','мҳӨ','мңЎ','м№ ','нҢ”','кө¬'], su=['','мӢӯ','л°ұ','мІң'], gu=['','л§Ң','м–ө','мЎ°'];
  let out='',gi=0;
  while(n>0){
    const g=n%10000;
    if(g){
      let s=''; String(g).split('').reverse().forEach((ch,i)=>{const v=+ch;if(!v)return;s=((v===1&&i>0)?'':d[v])+su[i]+s;});
      out=s+gu[gi]+out;
    }
    n=Math.floor(n/10000); gi++;
  }
  return out;
}

{t:'м ң 8 мЎ° гҖҗм„Өкі„ліҖкІҪмңјлЎң мқён•ң кі„м•ҪкёҲм•Ўмқҳ мЎ°м •гҖ‘',b:['1. "к°‘"мқҳ мұ…мһ„ мһҲлҠ” к·Җмұ…мӮ¬мң лЎң мқён•ҙ мӢңкіөм—җ кҙҖн•ҳм—¬ мҳҲкё°н•ҳм§Җ лӘ»н•ң мӮ¬нғңк°Җ л°ңмғқлҗҳкұ°лӮҳ мӮ¬м—…кі„нҡҚмқҳ ліҖкІҪ л“ұмңјлЎң мқён•ҳм—¬ м¶”к°Җ мӢңм„Өл¬јмқҳ м„Өм№ҳк°Җ н•„мҡ”н•ң л•Ңм—җлҠ” м„Өкі„лҘј ліҖкІҪн•ҳм—¬м•ј н•ңлӢӨ.','2. м ң1н•ӯмқҳ м„Өкі„ліҖкІҪмңјлЎң мқён•ҳм—¬ кіөмӮ¬лҹүмқҳ мҰқк°җмқҙ л°ңмғқн•ң л•Ңм—җлҠ” "к°‘"кіј "мқ„"мқҙ м„ңлЎң нҳ‘мқҳн•ҳм—¬ кі„м•ҪкёҲм•Ўмқ„ мЎ°м •н•ҳл©°, н•„мҡ”н•ң кІҪмҡ° кіөмӮ¬кё°к°„мқ„ м—°мһҘн•ҳкұ°лӮҳ лӢЁм¶•н•  мҲҳ мһҲлӢӨ. мқҙл•Ң мҰқк°җлҗң кіөмӮ¬мқҳ лӢЁк°ҖлҠ” "мқ„"мқҙ м ңмӢңн•ң мӮ°м¶ңлӮҙм—ӯм„ңлҘј кё°мӨҖмңјлЎң н•ҳлҗҳ мҰқк°җлҗң кіөмӮ¬м—җ лҢҖн•ң мқјл°ҳкҙҖлҰ¬л№„ л°Ҹ мқҙмңӨ л“ұмқҖ мғҒнҳё нҳ‘мқҳн•ҳм—¬ кІ°м •н•ңлӢӨ.']},
{t:'м ң 9 мЎ° гҖҗн•ҳмһҗліҙмҰқгҖ‘',b:['1. "мқ„"мқҖ "к°‘"мқҙ кіөмӮ¬лӘ©м Ғл¬јмқ„ мқёмҲҳн•ң лӮ кіј мӨҖкіөкІҖмӮ¬лҘј л§Ҳм№ң лӮ  мӨ‘м—җм„ң лЁјм Җ лҸ„лһҳн•ң лӮ лЎңл¶Җн„° кі„м•Ҫм„ңм—җ м •н•ң н•ҳмһҗліҙмҰқкё°к°„ мӨ‘ лӢ№н•ҙ кіөмӮ¬м—җ л°ңмғқн•ҳлҠ” мқјмІҙмқҳ н•ҳмһҗлҘј "мқ„"мқҳ л¶ҖлӢҙмңјлЎң ліҙмҲҳн•ҳм—¬м•ј н•ңлӢӨ.','2. кіөмӮ¬л¶Җмң„к°Җ мҶҢлӘЁн’Ҳ(м „кө¬, мҲҳм „ кё°нғҖл“ұл“ұ) м„Өм№ҳ л°Ҹ л¶Җн’Ҳмқј кІҪмҡ° "мқ„"мқҖ мұ…мһ„мқ„ л©ҙн•ңлӢӨ.','3. мӮ¬мҡ©мһҗмқҳ л¶ҖмЈјмқҳ л°Ҹ мӮ¬мҡ©мғҒмқҳ н•ҳмһҗ(мң лҰ¬ л°Ҹ м§‘кё°мқҳ мҶҗмғҒ нҸ¬н•Ё)к°Җ л°ңмғқн•  мӢңм—җлҠ” "мқ„"мқҖ мұ…мһ„мқ„ л©ҙн•ңлӢӨ.']},
{t:'м ң 10 мЎ° гҖҗк°‘мқҳ кі„м•Ҫн•ҙм ң л“ұгҖ‘',b:['1. "мқ„"мқҖ лӢӨмқҢ к°Ғнҳём—җ н•ҙлӢ№н•ҳлҠ” кІҪмҡ°м—җлҠ” кі„м•Ҫмқҳ м „л¶Җ лҳҗлҠ” мқјл¶ҖлҘј н•ҙм ң лҳҗлҠ” н•ҙм§Җн•  мҲҳ мһҲлӢӨ.','&nbsp;&nbsp;в‘  "мқ„"мқҙ м •лӢ№н•ң мқҙмң м—Ҷмқҙ м•Ҫм •н•ң м°©кіөкё°мқјмқ„ кІҪкіјн•ҳкі лҸ„ кіөмӮ¬м—җ м°©мҲҳн•ҳм§Җ м•„лӢҲн•ң кІҪмҡ°','&nbsp;&nbsp;в‘Ў "мқ„"мқҳ мұ…мһ„ мһҲлҠ” мӮ¬мң лЎң мқён•ҳм—¬ мӨҖкіөкё°мқј лӮҙм—җ кіөмӮ¬лҘј мҷ„м„ұн•  к°ҖлҠҘм„ұмқҙ м—ҶмқҢмқҙ лӘ…л°ұн•ң кІҪмҡ°','&nbsp;&nbsp;в‘ў "мқ„"мқҙ кҙҖн•  н–үм •мІӯмңјлЎңл¶Җн„° л©ҙн—Ҳ лҳҗлҠ” л“ұлЎқмқҳ м·ЁмҶҢ, м—…л¬ҙм •м§Җ л“ұмқҳ мІҳл¶„мқ„ л°ӣмқҖ кІҪмҡ°','2. мІңмһ¬м§ҖліҖ л“ұмқҳ л¶Җл“қмқҙ н•ң мӮ¬мң лЎң кі„м•Ҫмқҙн–үмқҙ кіӨлһҖн•ҳкІҢ лҗң кІҪмҡ°м—җлҠ” мғҒлҢҖл°©кіј нҳ‘мқҳн•ҳм—¬ кі„м•Ҫмқ„ н•ҙм ң н•ҙм§Җн•  мҲҳ мһҲлӢӨ.','3. м ң1н•ӯмқҳ к·ңм •м—җ мқҳн•ң нҶөм§ҖлҘј л°ӣмқҖ л•Ңм—җлҠ” лӢӨмқҢмқҳ мӮ¬н•ӯмқ„ мӨҖмҲҳн•ҳм—¬м•ј н•ңлӢӨ.','&nbsp;&nbsp;в‘  н•ҙм•ҪнҶөм§Җм„ңлҘј л°ӣмқҖ л¶Җл¶„м—җ лҢҖн•ң кіөмӮ¬лҘј м§ҖмІҙм—Ҷмқҙ мӨ‘м§Җн•ҳкі  лӘЁл“  кіөмӮ¬кҙҖл Ё мӢңм„Ө л°Ҹ мһҘл№„л“ұмқ„ кіөмӮ¬нҳ„мһҘмңјлЎңл¶Җн„° мІ кұ°н•ңлӢӨ.','&nbsp;&nbsp;в‘Ў "к°‘"мқҳ лҢҖм—¬н’Ҳмқҙ мһҲмқ„ л•Ңм—җлҠ” м§ҖмІҙм—Ҷмқҙ "к°‘"м—җкІҢ л°ҳнҷҳн•ңлӢӨ. мқҙ кІҪмҡ° лӢ№н•ҙ лҢҖм—¬н’Ҳмқҙ "мқ„"мқҳ кі мқҳ лҳҗлҠ” кіјмӢӨлЎң мқён•ҳм—¬ л©ёмӢӨ лҳҗлҠ” нҢҢмҶҗлҗҳм—Ҳмқ„ л•Ңм—җлҠ” мӣҗмғҒнҡҢліө лҳҗлҠ” к·ё мҶҗн•ҙм•Ўмқ„ л°°мғҒн•ңлӢӨ.']},
{t:'м ң 11 мЎ° гҖҗмқ„мқҳ кі„м•Ҫн•ҙм ң л“ұгҖ‘',b:['1. "мқ„"мқҖ лӢӨмқҢ к°Ғнҳём—җ н•ҙлӢ№н•ҳлҠ” кІҪмҡ°м—җлҠ” кі„м•Ҫмқҳ м „л¶Җ лҳҗлҠ” мқјл¶ҖлҘј н•ҙм ң лҳҗлҠ” н•ҙм§Җн•  мҲҳ мһҲлӢӨ.','&nbsp;&nbsp;в‘  кіөмӮ¬лӮҙмҡ©мқ„ ліҖкІҪн•ЁмңјлЎңмҚЁ кі„м•ҪкёҲм•Ўмқҙ 100л¶„мқҳ 30 мқҙмғҒ к°җмҶҢлҗң л•Ң','&nbsp;&nbsp;в‘Ў "к°‘"мқҳ мұ…мһ„ мһҲлҠ” мӮ¬мң м—җ мқҳн•ң кіөмӮ¬мқҳ м •м§Җкё°к°„мқҙ кі„м•Ҫм„ңмғҒмқҳ кіөмӮ¬кё°к°„мқҳ 100л¶„мқҳ 30мқ„ мҙҲкіјн•ң л•Ң','&nbsp;&nbsp;в‘ў "к°‘"мқҙ м •лӢ№н•ң мқҙмң м—Ҷмқҙ кі„м•ҪлӮҙмҡ©(лҢҖкёҲм§ҖкёүнҸ¬н•Ё)мқ„ мқҙн–үн•ҳм§Җ м•„лӢҲн•ЁмңјлЎңмҚЁ кіөмӮ¬мқҳ м Ғм •мқҙн–үмқҙ л¶Ҳк°ҖлҠҘ н•ҳлӢӨкі  мқём •лҗҳлҠ” л•Ң','2. м ң1н•ӯмқҳ к·ңм •м—җ мқҳн•ң кі„м•Ҫмқҳ н•ҙм ң лҳҗлҠ” н•ҙм§ҖлҠ” "мқ„"мқҙ "к°‘"м—җкІҢ м„ңл©ҙмңјлЎң кі„м•Ҫмқҙн–үкё°к°„мқ„ м •н•ҳм—¬ нҶөліҙн•ң нӣ„ м ңмӢңн•ң кё°к°„лӮҙм—җ мқҙн–үлҗҳм§Җ м•„лӢҲн•ң л•Ң нҡЁл Ҙмқҙ л°ңмғқн•ңлӢӨ.']},
{t:'м ң 12 мЎ° гҖҗкі„м•Ҫн•ҙм§ҖмӢңмқҳ мІҳлҰ¬гҖ‘',b:['1. м ң10мЎ° л°Ҹ м ң11мЎ°мқҳ к·ңм •м—җ мқҳн•ң кі„м•Ҫмқҳ н•ҙм ң лҳҗлҠ” н•ҙм§ҖлЎң мқён•ҳм—¬ мҶҗн•ҙк°Җ л°ңмғқн•ңл•Ңм—җлҠ” мғҒлҢҖл°©м—җкІҢ к·ём—җ лҢҖн•ң л°°мғҒмқ„ мІӯкө¬н•  мҲҳ мһҲлӢӨ.']},
{t:'м ң 13 мЎ° гҖҗкі„м•Ҫмқҳ м–‘лҸ„ л°Ҹ ліҖкІҪ л“ұгҖ‘',b:['1. "к°‘"кіј "мқ„"мқҖ мғҒлҢҖл°©мқҳ мҠ№лӮҷ м—ҶмқҙлҠ” мқҙ кі„м•ҪмғҒмқҳ к¶ҢлҰ¬В·мқҳл¬ҙлҘј м ң3мһҗм—җкІҢ м–‘лҸ„, лҢҖм—¬, лӢҙліҙм ңкіө л“ұ кё°нғҖ мІҳл¶„н–үмң„лҘј н•  мҲҳ м—ҶлӢӨ.','2. "к°‘"мқҳ кі„нҡҚліҖкІҪ, кҙҖкі„лІ•к·ңмқҳ к°ңВ·нҸҗ, мІңмһ¬м§ҖліҖ л“ұ л¶Ҳк°Җн•ӯл Ҙм Ғмқё мӮ¬мң мқҳ л°ңмғқмңјлЎң м„Өкі„м—…л¬ҙлҘј мҲҳм •н•ҳкұ°лӮҳ кі„м•Ҫкё°к°„мқ„ м—°мһҘн•  мғҒлӢ№н•ң мқҙмң к°Җ мһҲлҠ” л•Ңм—җлҠ” "к°‘"кіј "мқ„"мқҖ м„ңлЎң нҳ‘мқҳн•ҳм—¬ кі„м•Ҫмқҳ лӮҙмҡ©мқ„ ліҖкІҪн•  мҲҳ мһҲлӢӨ.','3. "мқ„"мқҖ кіөмӮ¬лӘ©м Ғл¬ј лҳҗлҠ” кіөмӮ¬нҳ„мһҘм—җ л°ҳмһ…н•ҳм—¬ кІҖмӮ¬лҘј н•„ н•ң кіөмӮ¬мһҗмһ¬м—җ лҢҖн•ҳм—¬ м ң3мһҗм—җкІҢ л§Өк°Ғ, м–‘лҸ„ лҳҗлҠ” лҢҖм—¬н•ҳкұ°лӮҳ лӢҙліҙлӘ©м ҒмңјлЎң м ңкіөн•  мҲҳ м—ҶлӢӨ.']},

{t:'м ң 15 мЎ° гҖҗкё°л°Җмң м§ҖгҖ‘',b:['1. кё°нғҖ мқҙ кі„м•Ҫм—җм„ң м •н•ҳм§Җ м•„лӢҲн•ң мӮ¬н•ӯм—җ лҢҖн•ҳм—¬лҠ” "к°‘"кіј "мқ„"мқҙ н•©мқҳн•ҳм—¬ лі„лҸ„мқҳ нҠ№м•Ҫмқ„ м •н•  мҲҳ мһҲлӢӨ.']},

function newContract(){
  const p=proj(),i=p.info;
  const nm=i.name||'';
  const ctr={id:uid(),date:todayStr(),
    siteName:nm+(/мқён…ҢлҰ¬м–ҙ|кіөмӮ¬/.test(nm)?' кіөмӮ¬':' мқён…ҢлҰ¬м–ҙ кіөмӮ¬'),siteAddr:i.address||'',
    start:i.start||'',end:i.end||'',amount:i.amount||'',
    payments:[
      {id:uid(),label:'кі„м•ҪкёҲ',pct:'50',note:'кі„м•Ҫ лӢ№мқј м§Җкёү'},
      {id:uid(),label:'мӨ‘лҸ„кёҲ',pct:'25',note:'кіөм • 50% мӢңм җ м§Җкёү'},
      {id:uid(),label:'мһ”кёҲ',pct:'25',note:'мӨҖкіө нӣ„ 10мқј мқҙлӮҙ м§Җкёү'}],
    defectRate:'100л¶„мқҳ 10',defectMonths:'12',delayRate:'1/1000',
    bank:CO().bank||'',etc:'',
    clientCo:i.client||'',clientAddr:'',clientCeo:''};
  p.contracts=p.contracts||[];p.contracts.push(ctr);save();
  state.ctrOpen=ctr.id;render();
}

  document.getElementById('newCtr').onclick=newContract;

  </div>`;
}
/* лҸ„кёүмЎ°кұҙмқҖ л¶„лҹүмқҙ A4 н•ң мһҘмқ„ л„ҳмңјлҜҖлЎң мЎ°н•ӯ лӢЁмң„лЎң м—¬лҹ¬ нҺҳмқҙм§Җм—җ лӮҳлҲ  лӢҙлҠ”лӢӨ */
function ctrTermsPages(){
  const lines=a=>1.6+a.b.reduce((s,x)=>s+Math.ceil(String(x).replace(/&nbsp;/g,' ').replace(/<[^>]*>/g,'').length/54),0);
  const MAX=50; /* A4(psheet) н•ң мһҘм—җ л“Өм–ҙк°ҖлҠ” лҢҖлһөмқҳ мӨ„ мҲҳ */
  const chunks=[];let cur=[],used=4; /* мІ« мһҘмқҖ м ңлӘ©л§ҢнҒј м—¬мң лҘј ләҢ */
  CTR_TERMS.forEach(a=>{const L=lines(a);
    if(used+L>MAX&&cur.length){chunks.push(cur);cur=[];used=0;}
    cur.push(a);used+=L;});
  if(cur.length)chunks.push(cur);
  return chunks.map((arts,pi)=>`<div class="ctrterms">
    ${pi===0?'<div class="ctrterms-h1">лҸ„кёү кі„м•ҪмЎ°кұҙ</div>':''}
    ${arts.map(a=>`<div class="ctr-art"><div class="at">${esc(a.t)}</div>${a.b.map(x=>`<div class="ab">${x}</div>`).join('')}</div>`).join('')}
    <div style="text-align:center;color:#aaa;font-size:9px;margin-top:18px">вҖ” лҸ„кёү кі„м•ҪмЎ°кұҙ ${pi+1} / ${chunks.length} вҖ”</div>
  </div>`);
}
/* л№„м–ҙмһҲлҠ” н•ӯлӘ©мқҖ нҳ„мһҘ(н”„лЎңм қнҠё) м •ліҙлЎң мһҗлҸҷ мұ„мӣҖ вҖ” л”°лЎң м Ғмқ„ н•„мҡ” м—ҶмқҢ */
function ctrEff(ctr){
  const i=proj().info;
  const eff=Object.assign({},ctr);
  if(!eff.siteAddr)eff.siteAddr=i.address||'';
  if(!eff.start)eff.start=i.start||'';
  if(!eff.end)eff.end=i.end||'';
  if(!+eff.amount)eff.amount=i.amount||'';
  if(!eff.clientCo)eff.clientCo=i.client||'';
  if(!eff.bank)eff.bank=CO().bank||'';
  return eff;
}
function openCtrPreview(ctr){
  const e=ctrEff(ctr);
  showPreview('кіөмӮ¬кі„м•Ҫм„ң',[ctrCoverHtml(e),ctrMainHtml(e),ctrSignHtml(e),...ctrTermsPages()],false);
}
/* кі„м•Ҫм„ң вҶ’ мӣҢл“ң(.doc): нҺҳмқҙм§ҖлҘј нҺҳмқҙм§Җ лӮҳлҲ”мңјлЎң мқҙм–ҙл¶ҷмқҙкі , мӣҢл“ңк°Җ лӘ» мқҪлҠ” SVG(лЎңкі В·лҸ„мһҘ)лҠ” м ңмҷё */
function exportCtrWord(ctr){
  const e=ctrEff(ctr);
  const html=[ctrCoverHtml(e),ctrMainHtml(e),ctrSignHtml(e),...ctrTermsPages()]
    .map((pg,i)=>`<div${i?' style="page-break-before:always"':''}>${pg}</div>`).join('')
    .replace(/<svg[\s\S]*?<\/svg>/g,'');
  downloadWordDoc(`кіөмӮ¬кі„м•Ҫм„ң_${safeName(proj().info.name||'нҳ„мһҘ')}_${todayStr()}.doc`,html);
}

/* н”„лЎңм қнҠёк°Җ м•„лӢҢ DB(нҡҢмӮ¬) л ҲлІЁм—җ м ҖмһҘлҗҳлҠ” нҸј нғҖмһ… */
const DB_FORM_TARGET={price:'priceDB',coexp:'coExpenses',vendors:'vendors',workerdb:'workersDB'};
let overlayEl=null;
function openForm(type,existing,preset){
  /* preset: мғҲ н•ӯлӘ©мқҳ кё°ліёк°’ лҜёлҰ¬ мұ„мӣҖ (мҳҲ: мқјм§Җ лӮ м§ңм№ём—җм„ң м§Җм¶ңВ·мһ‘м—…мһҗ м¶”к°Җ) */
  const cfg=FORMS[type],editing=!!existing,data=existing||preset||{};
  const fh=cfg.fields.map(f=>{const val=data[f.k]!=null?data[f.k]:(f.t==='date'&&!editing&&(f.k==='date')?todayStr():'');
    let input;
    if(f.t==='select')input=`<select name="${f.k}">${f.opt.map(o=>`<option ${String(val)===o?'selected':''}>${o}</option>`).join('')}</select>`;
    else if(f.t==='textarea')input=`<textarea name="${f.k}" placeholder="${f.hint||''}">${esc(val)}</textarea>`;
    else if(f.t==='images')input=`<div data-imgs="${f.k}">
      <input type="hidden" name="${f.k}" value="${esc(JSON.stringify(Array.isArray(val)?val:[]))}">
      <div class="imgs-grid" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"></div>
      <label class="btn sm">${svg(IC.camera)} мӮ¬м§„ м¶”к°Җ<input type="file" accept="image/*" multiple hidden data-imgsadd="${f.k}"></label></div>`;
    else if(f.t==='image')input=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <input type="hidden" name="${f.k}" value="${esc(val)}">
      <img data-imgprev="${f.k}" src="${esc(val)}" style="${f.fix?'width:80px;height:60px;object-fit:cover':'width:64px;height:64px;object-fit:contain'};border:1px solid var(--line);border-radius:8px;background:#fff;${val?'':'display:none'}">
      <label class="btn sm">мӮ¬м§„ м„ нғқ<input type="file" accept="image/*" hidden data-imgpick="${f.k}" ${f.fix?'data-imgfix="1"':''}></label>
      <button type="button" class="btn sm" data-imgpaste="${f.k}" ${f.fix?'data-imgfix="1"':''} title="нҷҲнҺҳмқҙм§Җм—җм„ң мқҙлҜём§Җ ліөмӮ¬(мәЎміҗ) нӣ„ лҲ„лҘҙм„ёмҡ” вҖ” Ctrl+VлҸ„ лҗ©лӢҲлӢӨ">${svg(IC.copy)}мәЎміҗ л¶ҷм—¬л„Јкё°</button>
      <button type="button" class="btn sm ghost" data-imgclear="${f.k}" style="color:var(--bad);${val?'':'display:none'}">мӮӯм ң</button></div>`;
    else input=`<input name="${f.k}" type="${f.t||'text'}" value="${esc(val)}" ${f.dl?`list="dl-${f.dl}"`:''} ${f.t==='number'?'step="any"':''}>`;
    return`<div class="field ${f.full?'full':''} ${f.money?'money':''}"><label>${f.l}${f.req?' <span class="req">*</span>':''}</label>${input}${f.hint&&f.t!=='textarea'?`<span class="hint">${f.hint}</span>`:''}</div>`;
  }).join('');
  overlayEl=document.createElement('div');overlayEl.className='overlay';
  overlayEl.innerHTML=`<div class="modal" role="dialog" aria-modal="true"><h2>${editing?'мҲҳм •':'м¶”к°Җ'} В· ${cfg.title}</h2><div class="msub">${cfg.sub}</div>
    <form class="form" id="entForm">${fh}</form>
    <div class="modal-foot">${editing&&type!=='info'&&type!=='company'?`<button type="button" class="btn ghost" id="delBtn" style="color:var(--bad)">${svg(IC.trash)}мӮӯм ң</button>`:type==='info'?`<button type="button" class="btn ghost" id="delProjBtn" style="color:var(--bad)">${svg(IC.trash)}н”„лЎңм қнҠё мӮӯм ң</button>`:'<span></span>'}
    <div class="right"><button type="button" class="btn" id="cancelBtn">м·ЁмҶҢ</button><button type="submit" class="btn green" form="entForm">${editing?'м ҖмһҘ':'м¶”к°Җ'}</button></div></div></div>`;
  document.body.appendChild(overlayEl);
  const close=()=>{overlayEl.remove();overlayEl=null;};
  overlayEl.addEventListener('mousedown',e=>{if(e.target===overlayEl)close();});
  document.addEventListener('keydown',function k(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',k);}});
  overlayEl.querySelector('#cancelBtn').onclick=close;
  /* мқҙлҜём§Җ н•„л“ң мІҳлҰ¬ вҖ” fix н•„л“ң(л§Ҳк°җмһ¬В·мһҗмһ¬ мӮ¬м§„)лҠ” н•ӯмғҒ лҸҷмқј к·ңкІ©(720Г—540)мңјлЎң нҒ¬лЎӯ */
  const setFieldImg=async(k,file,fix)=>{
    const du=await(fix?normSpecImage(file):compressImage(file,file.type==='image/png'?900:640));
    if(!du){alert('мқҙлҜём§ҖлҘј мқҪм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.');return false;}
    overlayEl.querySelector(`input[name="${k}"]`).value=du;
    const pv=overlayEl.querySelector(`[data-imgprev="${k}"]`);pv.src=du;pv.style.display='';
    overlayEl.querySelector(`[data-imgclear="${k}"]`).style.display='';
    return true;
  };
  overlayEl.querySelectorAll('[data-imgpick]').forEach(fi=>fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    await setFieldImg(fi.dataset.imgpick,f,!!fi.dataset.imgfix);
  });
  /* мәЎміҗ л¶ҷм—¬л„Јкё° вҖ” нҷҲнҺҳмқҙм§Җм—җм„ң мқҙлҜём§Җ ліөмӮ¬ нӣ„ лІ„нҠј нҒҙлҰӯ(лҳҗлҠ” Ctrl+V) */
  overlayEl.querySelectorAll('[data-imgpaste]').forEach(b=>b.onclick=async()=>{
    const k=b.dataset.imgpaste,fix=!!b.dataset.imgfix;
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){
        const t=it.types.find(x=>x.startsWith('image/'));
        if(t){const blob=await it.getType(t);if(await setFieldImg(k,blob,fix))toast('мәЎміҗ мқҙлҜём§Җк°Җ л“ұлЎқлҗҳм—ҲмҠөлӢҲлӢӨ');return;}
      }
      toast('нҒҙлҰҪліҙл“ңм—җ мқҙлҜём§Җк°Җ м—ҶмҠөлӢҲлӢӨ вҖ” нҷҲнҺҳмқҙм§Җм—җм„ң мқҙлҜём§ҖлҘј ліөмӮ¬н•ң л’Ө лӢӨмӢң лҲҢлҹ¬мЈјм„ёмҡ”');
    }catch(e){toast('нҒҙлҰҪліҙл“ң м ‘к·јмқҙ л§үнҳҖ мһҲмҠөлӢҲлӢӨ вҖ” мқҙ м°Ҫм—җм„ң Ctrl+VлҘј лҲҢлҹ¬ліҙм„ёмҡ”');}
  });
  overlayEl.addEventListener('paste',e=>{
    const f=[...((e.clipboardData||{}).files||[])].find(x=>x.type.startsWith('image/'));
    if(!f)return;
    const pb=overlayEl.querySelector('[data-imgpaste]');if(!pb)return;
    e.preventDefault();
    setFieldImg(pb.dataset.imgpaste,f,!!pb.dataset.imgfix).then(ok=>{if(ok)toast('мәЎміҗ мқҙлҜём§Җк°Җ л“ұлЎқлҗҳм—ҲмҠөлӢҲлӢӨ');});
  });
  overlayEl.querySelectorAll('[data-imgclear]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.imgclear;
    overlayEl.querySelector(`input[name="${k}"]`).value='';
    overlayEl.querySelector(`[data-imgprev="${k}"]`).style.display='none';
    b.style.display='none';
  });
  /* лӢӨмӨ‘ мӮ¬м§„ н•„л“ң (нҳ„мһҘмқјм§Җ л“ұ) */
  overlayEl.querySelectorAll('[data-imgs]').forEach(wrap=>{
    const hid=wrap.querySelector('input[type=hidden]'),grid=wrap.querySelector('.imgs-grid');
    const get=()=>{try{return JSON.parse(hid.value||'[]');}catch(e){return[];}};
    const setv=a=>{hid.value=JSON.stringify(a);draw();};
    const draw=()=>{grid.innerHTML=get().map((du,i)=>`<div style="position:relative"><img src="${du}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;display:block;border:1px solid var(--line)">
      <button type="button" data-imgdel="${i}" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:var(--bad);color:#fff;font-size:12px;cursor:pointer;line-height:1">Г—</button></div>`).join('');
      grid.querySelectorAll('[data-imgdel]').forEach(b=>b.onclick=()=>{const a=get();a.splice(+b.dataset.imgdel,1);setv(a);});};
    draw();
    wrap.querySelector('[data-imgsadd]').onchange=async e=>{
      const fs=[...e.target.files];if(!fs.length)return;
      const a=get();
      for(const f of fs){const du=await compressImage(f);if(du)a.push(du);}
      setv(a);e.target.value='';
    };
  });
  const del=overlayEl.querySelector('#delBtn');
  if(del)del.onclick=()=>{if(confirm('мӮӯм ңн• к№Ңмҡ”?')){
    if(DB_FORM_TARGET[type])DB[DB_FORM_TARGET[type]]=DB[DB_FORM_TARGET[type]].filter(x=>x.id!==existing.id);
    else{const p=proj();p[type]=p[type].filter(x=>x.id!==existing.id);}
    save();close();render();}};
  const delP=overlayEl.querySelector('#delProjBtn');
  if(delP)delP.onclick=()=>{
    if(DB.projects.length<=1){alert('л§Ҳм§Җл§ү лӮЁмқҖ н”„лЎңм қнҠёлҠ” мӮӯм ңн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');return;}
    const cur=proj();
    if(!confirm(`'${cur.info.name}' н”„лЎңм қнҠёлҘј мӮӯм ңн• к№Ңмҡ”?\nмқјм •В·м§Җм¶ңВ·мӮ¬м§„ л“ұ лӘЁл“  лҚ°мқҙн„°к°Җ н•Ёк»ҳ мӮӯм ңлҗҳл©° лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.`))return;
    if(!confirm('м •л§җ мӮӯм ңн•©лӢҲлӢӨ. кі„мҶҚн• к№Ңмҡ”?'))return;
    DB.projects=DB.projects.filter(x=>x.id!==cur.id);
    DB.active=DB.projects[0].id;
    save();close();render();toast('н”„лЎңм қнҠёк°Җ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ');
  };
  overlayEl.querySelector('#entForm').onsubmit=e=>{e.preventDefault();
    const fd=new FormData(e.target),obj={};
    cfg.fields.forEach(f=>{let v=fd.get(f.k);if(f.t==='number')v=v===''?'':Number(v);if(f.t==='images'){try{v=JSON.parse(v||'[]');}catch(err){v=[];}}obj[f.k]=v;});
    for(const f of cfg.fields)if(f.req&&(obj[f.k]===''||obj[f.k]==null)){alert(`'${f.l}' н•ӯлӘ©мқ„ мһ…л Ҙн•ҙ мЈјм„ёмҡ”.`);return;}
    cfg.fields.forEach(f=>{if(f.dl==='trades'&&obj[f.k])addTrade(obj[f.k]);});
    if(type==='info')Object.assign(proj().info,obj);
    else if(DB_FORM_TARGET[type]&&!editing){obj.id=uid();(DB[DB_FORM_TARGET[type]]=DB[DB_FORM_TARGET[type]]||[]).push(obj);}
    else if(editing)Object.assign(existing,obj);
    else{const p=proj();obj.id=uid();(p[type]=p[type]||[]).push(obj);}
    if(type==='workers')upsertWorkerDB(editing?existing:obj); /* нҳ„мһҘ м¶ңл Ҙ кё°лЎқ вҶ’ мһ‘м—…мһҗ лӘ…л¶Җ мһҗлҸҷ л°ҳмҳҒ */
    save();close();render();
  };
  if(!IS_TOUCH)setTimeout(()=>{const el=overlayEl?.querySelector('input,select,textarea');el&&el.focus();},30);
}

    toast('м ҖмһҘ мӢӨнҢЁ вҖ” мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”');
    syncDirty=true;queueSync();             /* мһҗлҸҷ мһ¬мӢңлҸ„лЎң л„ҳкёҙлӢӨ */
  }finally{
    syncBusy=false;
    if(b)setTimeout(()=>{b.disabled=false;b.textContent=orig;},1600);
  }
}
function bkStamp(){const d=new Date(),p=n=>String(n).padStart(2,'0');

function exportBackup(silent){

    a.href=url;a.download=`tofs-л°ұм—…-${bkStamp()}.json`;

    setTimeout(()=>URL.revokeObjectURL(url),4000);

  }catch(e){toast('л°ұм—… нҢҢмқј л§Ңл“Өкё°м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ');return false;}
}
/* л°ұм—… нҢҢмқјмқём§Җ нҷ•мқён•ҳкі  мҡ”м•Ҫмқ„ лӮёлӢӨ. м•„лӢҲл©ҙ null. */
function backupSummary(d){
  if(!d||typeof d!=='object'||!Array.isArray(d.projects))return null;
  return {np:d.projects.length,
          nm:d.projects.reduce((s,pr)=>s+(((pr&&pr.materials)||[]).length),0)};
}
function restoreBackup(file){
  const rd=new FileReader();
  rd.onerror=()=>toast('нҢҢмқјмқ„ мқҪм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ');
  rd.onload=()=>{
    let d=null;
    try{d=JSON.parse(rd.result);}catch(e){toast('л°ұм—… нҢҢмқјмқ„ мқҪмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ (нҳ•мӢқ мҳӨлҘҳ)');return;}
    const sum=backupSummary(d);
    if(!sum){toast('мқҙ нҢҢмқјмқҖ мқҙ м•ұмқҳ л°ұм—… нҢҢмқјмқҙ м•„лӢҷлӢҲлӢӨ');return;}
    const np=sum.np, nm=sum.nm;
    if(!confirm(`ліөмӣҗн•ҳл©ҙ м§ҖкёҲ лҚ°мқҙн„°лҘј лҚ®м–ҙм”ҒлӢҲлӢӨ.\n\nліөмӣҗн•  лӮҙмҡ©\nВ· нҳ„мһҘ ${np}к°ң\nВ· л§Ҳк°җмһ¬ ${nm}к°ң\n\nлҗҳлҸҢлҰҙ мҲҳ мһҲлҸ„лЎқ м§ҖкёҲ мғҒнғңлҘј лЁјм Җ нҢҢмқјлЎң лӮҙл Өл°ӣмҠөлӢҲлӢӨ.\n\nліөмӣҗн• к№Ңмҡ”?`))return;
    if(!exportBackup(true)&&!confirm('нҳ„мһ¬ мғҒнғң л°ұм—…м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.\nк·ёлһҳлҸ„ ліөмӣҗн• к№Ңмҡ”? (м§ҖкёҲ лҚ°мқҙн„°лҠ” лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ)'))return;
    DB=d;
    DB.projects=DB.projects||[];DB.priceDB=DB.priceDB||[];
    DB.trades=DB.trades||DEFAULT_TRADES.slice();
    DB.company=Object.assign({},CO_DEFAULT,DB.company||{});
    DB.projects.forEach(pr=>{pr.estimates=pr.estimates||[];pr.contracts=pr.contracts||[];pr.materials=pr.materials||[];});
    syncPriceCats();
    state.tab='home';
    save();render();
    toast(`ліөмӣҗ мҷ„лЈҢ вҖ” нҳ„мһҘ ${np}к°ң В· л§Ҳк°җмһ¬ ${nm}к°ң`);
  };
  rd.readAsText(file);
}

      <button class="btn" id="bkImp">л°ұм—… нҢҢмқјм—җм„ң ліөмӣҗ</button>
      <input type="file" id="bkFile" accept="application/json,.json" hidden>
      <div class="sub" style="line-height:1.65;margin-top:4px">ліөмӣҗмқҖ м§ҖкёҲ лҚ°мқҙн„°лҘј <b>лҚ®м–ҙм”ҒлӢҲлӢӨ</b>. лҚ®м–ҙм“°кё° м „ нҳ„мһ¬ мғҒнғңлҘј мһҗлҸҷмңјлЎң нҢҢмқјлЎң лӮҙл Өл°ӣмңјлӢҲ, мһҳлӘ» ліөмӣҗн•ҙлҸ„ лҗҳлҸҢлҰҙ мҲҳ мһҲмҠөлӢҲлӢӨ.</div>
    </div>
    <div class="modal-foot"><div class="right"><button class="btn" id="bkClose">лӢ«кё°</button></div></div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('mousedown',e=>{if(e.target===ov)close();});
  ov.querySelector('#bkClose').onclick=close;
  ov.querySelector('#bkExp').onclick=()=>exportBackup();
  const f=ov.querySelector('#bkFile');
  ov.querySelector('#bkImp').onclick=()=>f.click();
  f.onchange=()=>{const file=f.files&&f.files[0];if(file){close();restoreBackup(file);}};
}

/* ===== theme ===== */
function applyTheme(t){if(t)document.documentElement.setAttribute('data-theme',t);
  const dark=(document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))==='dark';
  document.getElementById('themeBtn').innerHTML=svg(dark?IC.sun:IC.moon);}
function initTheme(){let t=null;try{t=localStorage.getItem(KEY+'-theme');}catch(e){}applyTheme(t||'light');
  document.getElementById('themeBtn').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');const n=cur==='dark'?'light':'dark';try{localStorage.setItem(KEY+'-theme',n);}catch(e){}applyTheme(n);};}

if('serviceWorker' in navigator&&location.protocol==='https:'){addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}

(async function boot(){
  try{const s=JSON.parse(localStorage.getItem(SES_KEY)||'null');if(s&&s.refresh_token)session=s;}catch(e){}
  if(session){
    try{
      if(Date.now()>session.exp){await refreshSession();}
      else{clearTimeout(refT);refT=setTimeout(refreshSession,Math.max(30000,session.exp-Date.now()));}
    }catch(e){}
  }
  if(session){await enterApp();}
  else{showLogin();}
})();
