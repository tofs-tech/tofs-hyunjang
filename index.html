<!DOCTYPE html>
<html lang="ko">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#232B3C">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<title>TOFS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TOFS">
<style>
  :root{
    --bg:#EAEEF5; --surface:#FFFFFF; --surface-2:#F4F7FB; --surface-3:#E9EEF5;
    --ink:#131820; --muted:#4B5464; --faint:#79828F;
    --line:#DFE4EC; --line-strong:#C7CEDA;
    --primary:#232B3C; --primary-ink:#161C28;
    --accent:#3B51DC; --accent-ink:#2E41C0; --accent-soft:rgba(59,81,220,.10);
    --purple:#7A5AF0; --purple-soft:rgba(122,90,240,.12);
    --green:#12A45A; --green-ink:#0E8B4C; --green-soft:rgba(18,164,90,.12);
    --good:#12A45A; --good-soft:rgba(18,164,90,.12);
    --warn:#C6871B; --warn-soft:rgba(198,135,27,.14);
    --bad:#D24B3E;  --bad-soft:rgba(210,75,62,.12);
    --neutral:#7B8395; --neutral-soft:rgba(123,131,149,.13);
    --sun:#D24B3E; --sat:#3E6FD2;
    --shadow:0 1px 2px rgba(20,25,40,.04), 0 4px 16px rgba(20,25,40,.05);
    --sans:"Pretendard Variable","Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",system-ui,-apple-system,sans-serif;
    --mono:"SF Mono","Cascadia Mono","Consolas","D2Coding","Menlo",monospace;
    --r:14px; --r-sm:9px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#14171E; --surface:#1C2029; --surface-2:#232833; --surface-3:#2A303C;
    --ink:#E9ECF2; --muted:#9BA3B4; --faint:#6C7385;
    --line:#2A2F3A; --line-strong:#363D4A;
    --primary:#E9ECF2; --primary-ink:#FFFFFF;
    --accent:#8397FF; --accent-ink:#9DACFF; --accent-soft:rgba(131,151,255,.14);
    --purple:#A28CFF; --purple-soft:rgba(162,140,255,.16);
    --green:#3FC57E; --green-ink:#57D08F; --green-soft:rgba(63,197,126,.16);
    --good:#3FC57E; --good-soft:rgba(63,197,126,.16);
    --warn:#E0B056; --warn-soft:rgba(224,176,86,.16);
    --bad:#E97365; --bad-soft:rgba(233,115,101,.15);
    --neutral:#8B94A6; --neutral-soft:rgba(139,148,166,.16);
    --sun:#E97365; --sat:#7FA0F0;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.3);
  }}
  :root[data-theme="light"]{
    --bg:#EAEEF5; --surface:#FFFFFF; --surface-2:#F4F7FB; --surface-3:#E9EEF5;
    --ink:#131820; --muted:#4B5464; --faint:#79828F; --line:#DFE4EC; --line-strong:#C7CEDA;
    --primary:#232B3C; --primary-ink:#161C28; --accent:#3B51DC; --accent-ink:#2E41C0; --accent-soft:rgba(59,81,220,.10);
    --purple:#7A5AF0; --purple-soft:rgba(122,90,240,.12); --green:#12A45A; --green-ink:#0E8B4C; --green-soft:rgba(18,164,90,.12);
    --good:#12A45A; --good-soft:rgba(18,164,90,.12); --warn:#C6871B; --warn-soft:rgba(198,135,27,.14);
    --bad:#D24B3E; --bad-soft:rgba(210,75,62,.12); --neutral:#7B8395; --neutral-soft:rgba(123,131,149,.13);
    --sun:#D24B3E; --sat:#3E6FD2; --shadow:0 1px 2px rgba(20,25,40,.04), 0 4px 16px rgba(20,25,40,.05);
  }
  :root[data-theme="dark"]{
    --bg:#14171E; --surface:#1C2029; --surface-2:#232833; --surface-3:#2A303C;
    --ink:#E9ECF2; --muted:#9BA3B4; --faint:#6C7385; --line:#2A2F3A; --line-strong:#363D4A;
    --primary:#E9ECF2; --primary-ink:#FFFFFF; --accent:#8397FF; --accent-ink:#9DACFF; --accent-soft:rgba(131,151,255,.14);
    --purple:#A28CFF; --purple-soft:rgba(162,140,255,.16); --green:#3FC57E; --green-ink:#57D08F; --green-soft:rgba(63,197,126,.16);
    --good:#3FC57E; --good-soft:rgba(63,197,126,.16); --warn:#E0B056; --warn-soft:rgba(224,176,86,.16);
    --bad:#E97365; --bad-soft:rgba(233,115,101,.15); --neutral:#8B94A6; --neutral-soft:rgba(139,148,166,.16);
    --sun:#E97365; --sat:#7FA0F0; --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.3);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  button{font-family:inherit;}

  /* top bar */
  .appbar{position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:12px;
    padding:11px 22px; background:color-mix(in srgb,var(--bg) 85%,transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  .logo{display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:-.01em;}
  .logo .m{width:26px;height:26px;border-radius:7px;background:#4A7C50;color:#fff;display:grid;place-items:center;font-size:12px;font-weight:800;}
  .logo .sub{font-size:10.5px;color:var(--faint);font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
  .appbar .spacer{flex:1;}
  .psel{position:relative;}
  .psel select{appearance:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--surface);
    border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:8px 30px 8px 13px;cursor:pointer;max-width:260px;}
  .psel::after{content:"";position:absolute;right:12px;top:50%;width:6px;height:6px;border-right:1.6px solid var(--muted);border-bottom:1.6px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none;}

  .wrap{max-width:1240px;margin:0 auto;padding:20px 22px 70px;}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--r-sm);
    border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);cursor:pointer;transition:.12s;white-space:nowrap;}
  .btn:hover{border-color:var(--muted);}
  .btn svg{width:15px;height:15px;stroke-width:1.9;}
  .btn.dark{background:var(--primary);border-color:var(--primary);color:#fff;}
  :root[data-theme="dark"] .btn.dark{color:#14171E;} :root[data-theme="light"] .btn.dark{color:#fff;}
  .btn.dark:hover{background:var(--primary-ink);}
  .btn.green{background:var(--green);border-color:var(--green);color:#fff;} .btn.green:hover{background:var(--green-ink);}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff;} .btn.accent:hover{background:var(--accent-ink);}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:7px 9px;} .btn.ghost:hover{background:var(--accent-soft);color:var(--ink);}
  .btn.sm{padding:5px 10px;font-size:12px;}
  .icon-btn{display:grid;place-items:center;width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);cursor:pointer;}
  .icon-btn:hover{color:var(--ink);border-color:var(--muted);} .icon-btn svg{width:17px;height:17px;stroke-width:1.7;}

  /* header card */
  .phead{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px 22px;}
  .phead h1{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0 0 14px;}
  .amount{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer;transition:.12s;}
  .amount:hover{border-color:var(--accent);}
  .amount .l{font-size:11.5px;color:var(--muted);} .amount .v{font-size:19px;font-weight:700;letter-spacing:-.01em;}
  .amount .v small{font-size:12px;font-weight:500;color:var(--muted);margin-left:4px;}
  .amount .chev{margin-left:auto;color:var(--faint);}
  .pinfo{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;}
  .pinfo .row{display:grid;grid-template-columns:88px 1fr;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);align-items:center;}
  .pinfo .row:nth-last-child(-n+1){border-bottom:none;}
  .pinfo .k{font-size:12.5px;color:var(--muted);} .pinfo .v{font-size:13.5px;font-weight:500;}
  .pinfo .v.empty{color:var(--faint);font-weight:400;}
  .memoinput{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:7px 10px;}
  .phead-actions{display:flex;gap:10px;margin-top:16px;}
  .phead-actions .btn{flex:1;justify-content:center;}
  .link{color:var(--accent);cursor:pointer;font-weight:600;} .link:hover{text-decoration:underline;}

  /* tabs */
  .tabs{display:flex;gap:2px;margin:18px 0 20px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .tabs button{position:relative;background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:12px 15px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  .tabs button:hover{color:var(--ink);}
  .tabs button.active{color:var(--accent);}
  .tabs button.active::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:2.5px;background:var(--accent);border-radius:2px;}
  .badge{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:100px;background:var(--purple-soft);color:var(--purple);letter-spacing:.02em;}
  .badge.gray{background:var(--neutral-soft);color:var(--neutral);}

  /* cards / views */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
  .card+.card{margin-top:16px;}
  .card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .card-h .ct{font-size:14px;font-weight:650;} .card-h .cs{font-size:12px;color:var(--faint);}
  .pad{padding:18px;}
  .vhead{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .vhead .t{font-size:15px;font-weight:650;} .vhead .d{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .vhead .spacer{flex:1;}
  .tip{background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);border-radius:var(--r-sm);padding:11px 14px;font-size:12.5px;color:var(--ink);margin-bottom:16px;line-height:1.6;}
  .tip b{color:var(--accent-ink);}

  /* KPI */
  .kpis{display:grid;gap:12px;margin-bottom:16px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);}
  .kpi.tint{background:var(--purple-soft);border-color:transparent;}
  .kpi .k{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .kpi.tint .k{color:var(--purple);}
  .kpi .v{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.02em;}
  .kpi .v small{font-size:12px;font-weight:500;color:var(--muted);margin-left:2px;}
  .kpi .s{font-size:11.5px;color:var(--faint);margin-top:4px;}
  .kpi .bar{height:5px;border-radius:3px;background:var(--line);margin-top:10px;overflow:hidden;}
  .kpi .bar i{display:block;height:100%;border-radius:3px;background:var(--accent);}

  /* tables */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-weight:600;font-size:11.5px;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface-2);}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:var(--surface-2);}
  td.r,th.r{text-align:right;} td.c,th.c{text-align:center;}
  .row-actions{display:flex;gap:2px;justify-content:flex-end;opacity:.3;transition:.12s;}
  tr:hover .row-actions{opacity:1;} .row-actions .icon-btn{width:28px;height:28px;}
  .strong{font-weight:600;} .sub{color:var(--muted);font-size:12px;}
  .empty{padding:44px 20px;text-align:center;color:var(--faint);}
  .empty svg{width:32px;height:32px;opacity:.5;margin-bottom:10px;stroke-width:1.4;}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap;}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
  .pill.neutral{color:var(--neutral);background:var(--neutral-soft);}
  .pill.accent{color:var(--accent-ink);background:var(--accent-soft);}
  .pill.good{color:var(--good);background:var(--good-soft);}
  .pill.warn{color:var(--warn);background:var(--warn-soft);}
  .pill.bad{color:var(--bad);background:var(--bad-soft);}
  .pill.purple{color:var(--purple);background:var(--purple-soft);}
  .tag{display:inline-block;font-size:11px;color:var(--muted);background:var(--surface-3);border:1px solid var(--line);border-radius:5px;padding:2px 7px;white-space:nowrap;}

  /* calendar */
  .calbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .calbar .mo{font-size:17px;font-weight:700;letter-spacing:-.01em;min-width:130px;text-align:center;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--line);border-top:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface);}
  .cal .dow{padding:9px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--surface-2);}
  .cal .dow.s0{color:var(--sun);} .cal .dow.s6{color:var(--sat);}
  .cell{min-height:104px;padding:6px 6px 8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);position:relative;}
  .cell.out{background:var(--surface-2);} .cell.today{box-shadow:inset 0 0 0 2px var(--accent);}
  .cell .dn{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--ink);}
  .cell.out .dn{color:var(--faint);} .cell .dn.s0{color:var(--sun);} .cell .dn.s6{color:var(--sat);}
  .cell .hol{font-size:9.5px;color:var(--sun);font-weight:600;margin-left:4px;}
  .cell .chips{display:flex;flex-direction:column;gap:3px;margin-top:5px;}
  .chip{display:flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 6px;border-radius:5px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .chip .ck{width:12px;height:12px;flex:none;}
  .chip.done{opacity:.72;}
  /* 홈 대시보드 */
  .hcard{cursor:pointer;transition:.12s;margin-top:14px;}
  .hcard:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(20,25,40,.09);}
  .hstrip{position:relative;height:16px;border-radius:8px;background:var(--surface-3);margin-top:10px;overflow:hidden;}
  .hstrip i{position:absolute;top:2px;bottom:2px;border-radius:4px;}
  .hstrip b{position:absolute;top:-1px;bottom:-1px;width:2px;background:var(--bad);box-shadow:0 0 0 1px rgba(255,255,255,.6);}
  .hstrip-lb{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-top:3px;font-family:var(--mono);}
  .cell .mlab{font-size:9px;color:var(--accent);font-weight:800;margin-left:3px;letter-spacing:-.02em;}
  .cell.alt{background:color-mix(in srgb,var(--accent-soft) 55%,transparent);}
  .cell.alt.out{background:var(--surface-2);}

  /* gantt timeline (공정표) */
  .gwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow);}
  .gwrap .gantt{--cw:36px;min-width:max-content;}
  .grow{display:flex;align-items:stretch;border-bottom:1px solid var(--line);}
  .grow:last-child{border-bottom:none;}
  .glabel{width:148px;flex:none;position:sticky;left:0;z-index:3;background:var(--surface);border-right:1px solid var(--line-strong);
    display:flex;align-items:center;gap:8px;padding:0 14px;font-size:12.5px;font-weight:650;min-height:44px;}
  .gdot{width:9px;height:9px;border-radius:3px;flex:none;}
  .gpn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .gtrack{position:relative;width:calc(var(--cw) * var(--n));flex:none;min-height:44px;}
  .gcells{display:grid;}
  .gcells.gbg{position:absolute;inset:0;}
  .gbg .gcell{border-right:1px solid var(--line);}
  .gcell.we{background:var(--surface-2);}
  .gcell.gtd{background:var(--accent-soft);box-shadow:inset 1.5px 0 0 var(--accent);}
  .ghrow{border-bottom:2px solid var(--line-strong);}
  .ghcorner{background:var(--surface-2);z-index:5;color:var(--muted);font-size:11.5px;font-weight:600;}
  .ghtrack{display:flex;flex-direction:column;}
  .gmonrow{display:flex;height:23px;border-bottom:1px solid var(--line);background:var(--surface-2);}
  .gmo{flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);border-right:1px solid var(--line-strong);}
  .gdrow{height:42px;background:var(--surface);}
  .gdcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-right:1px solid var(--line);}
  .gdn{font-size:11px;font-weight:600;font-family:var(--mono);} .gdn.s0{color:var(--sun);} .gdn.s6{color:var(--sat);}
  .gdw{font-size:9px;color:var(--faint);}
  .gbar{position:absolute;top:50%;transform:translateY(-50%);height:26px;display:flex;align-items:center;gap:4px;padding:0 9px;
    border:1.5px solid;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;overflow:hidden;white-space:nowrap;z-index:1;transition:box-shadow .1s;}
  .gbar:hover{box-shadow:0 3px 12px rgba(20,25,40,.18);z-index:2;}
  .gbar .gbl{overflow:hidden;text-overflow:ellipsis;}
  .gbar .gck{display:inline-flex;flex:none;} .gbar .gck svg{width:12px;height:12px;stroke-width:3;}
  .gbar.st-neutral{border-style:dashed;}
  .gbar.done{opacity:.72;}
  .gbar.st-bad{border-color:var(--bad)!important;color:var(--bad)!important;background:var(--bad-soft)!important;}
  .glegend{display:flex;gap:16px;flex-wrap:wrap;margin:12px 2px 0;font-size:11.5px;color:var(--muted);}
  .glegend .lg{display:inline-flex;align-items:center;gap:6px;}
  .gsw{width:16px;height:12px;border-radius:4px;border:1.5px solid var(--muted);background:color-mix(in srgb,var(--muted) 16%,transparent);flex:none;}
  .gsw.dash{border-style:dashed;background:transparent;}
  .gsw.fill{background:color-mix(in srgb,var(--accent) 24%,transparent);border-color:var(--accent);}
  .gsw.done{opacity:.55;}
  .gsw.wknd{background:var(--surface-2);border-color:var(--line-strong);}
  .gsw.tdy{background:var(--accent-soft);border-color:var(--accent);}
  @media (max-width:820px){ .gantt{--cw:30px;} .glabel{width:104px;padding:0 10px;font-size:12px;} }

  /* todos */
  .todos{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  .todo-list{display:flex;flex-direction:column;gap:8px;padding:8px 0;}
  .todo{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
  .todo .cb{width:18px;height:18px;border:2px solid var(--line-strong);border-radius:50%;flex:none;cursor:pointer;margin-top:1px;display:grid;place-items:center;}
  .todo.done .cb{background:var(--green);border-color:var(--green);} .todo.done .cb svg{width:11px;height:11px;color:#fff;stroke-width:3;}
  .todo.done .tx{text-decoration:line-through;color:var(--faint);}
  .todo .tx{font-size:13px;font-weight:500;} .todo .meta{font-size:10.5px;color:var(--faint);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;}
  .addbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

  /* login & cloud sync */

  .sync{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted);padding:5px 10px;border-radius:100px;background:var(--surface);border:1px solid var(--line);white-space:nowrap;}
  .verchip{font-size:10.5px;font-weight:600;color:var(--muted);padding:5px 9px;border-radius:100px;background:none;border:1px solid var(--line);cursor:pointer;white-space:nowrap;font-family:inherit;}
  .verchip.upd{background:var(--primary);color:#fff;border-color:var(--primary);}
  .sync::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--neutral);flex:none;}

  .sync.busy{color:var(--accent-ink);} .sync.busy::before{background:var(--accent);animation:syncpulse 1s infinite;}

  /* 터치 기기(폰·패드): hover가 없으므로 수정/삭제 버튼 항상 표시 */

/* 사진을 긴 변 max(기본 1280px)로 자동 압축. png=true면 투명 유지(로고용) */
function compressImage(file,max,png){return new Promise(res=>{const img=new Image();
  img.onload=()=>{const MAX=max||1280;let w=img.naturalWidth,h=img.naturalHeight;
    if(w>MAX||h>MAX){const k=MAX/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(img.src);
    const usePng=png||(file&&file.type==='image/png');
    try{res(usePng?cv.toDataURL('image/png'):cv.toDataURL('image/jpeg',.72));}catch(e){res(null);}};
  img.onerror=()=>{URL.revokeObjectURL(img.src);res(null);};
  img.src=URL.createObjectURL(file);});}
/* 마감재·자재 사진 규격화 — 항상 동일 사이즈(720×540, 4:3) 중앙 크롭. 홈페이지 캡쳐가 들쭉날쭉해도 통일됨 */
function normSpecImage(file){return new Promise(res=>{const img=new Image();
  img.onload=()=>{const W=720,H=540;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const k=Math.max(W/img.naturalWidth,H/img.naturalHeight);
    const w=img.naturalWidth*k,h=img.naturalHeight*k;
    const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h);
    URL.revokeObjectURL(img.src);
    try{res(cv.toDataURL('image/jpeg',.78));}catch(e){res(null);}};
  img.onerror=()=>{URL.revokeObjectURL(img.src);res(null);};
  img.src=URL.createObjectURL(file);});}

/* 공유: 폰에서는 공유창(카톡·문자·밴드 선택), PC에서는 클립보드 복사 */
const canShare=()=>!!navigator.share&&/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
function shareText(t,label){
  if(canShare()){
    navigator.share({text:t}).catch(e=>{if(!e||e.name!=='AbortError')copyText(t,label);});
  } else copyText(t,label);
}

/* 일정표·발주서 시트를 PNG 이미지로 변환해 공유(폰) 또는 저장(PC) */
let h2cP=null;
function loadH2C(){
  if(window.html2canvas)return Promise.resolve();
  if(h2cP)return h2cP;
  h2cP=new Promise((res,rej)=>{const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=res; s.onerror=()=>{h2cP=null;rej(new Error('cdn'));};
    document.head.appendChild(s);});
  return h2cP;
}
async function sheetToBlob(html,land){
  await loadH2C();
  /* 에디토리얼 문서(.ed)는 크림 종이가 디자인의 일부 — 이미지로 보낼 때도 유지한다 (흰색 설정 시 흰색) */
  const cream=/class="ed[\s"]/.test(html)?(DB.edPaper==='white'?'#ffffff':'#F7F4EE'):'#ffffff';
  const host=document.createElement('div');
  host.style.cssText=`position:fixed;left:-12000px;top:0;background:${cream};padding:24px;width:`+(land?'1500px':'860px');
  host.innerHTML=`<div class="psheet${land?' land':''}">${html}</div>`;
  document.body.appendChild(host);
  try{
    const cv=await html2canvas(host,{scale:2,backgroundColor:cream,logging:false});
    return await new Promise(r=>cv.toBlob(r,'image/png'));
  } finally { host.remove(); }
}
/* 준비된 이미지들을 페이지별 파일로 즉시 공유 — 실패 시 자동으로 저장으로 전환 */
async function shareBlobFiles(blobs,title){
  blobs=blobs.filter(Boolean); if(!blobs.length)return;
  const base=`${(proj().info.name||'현장')} ${title}`;
  const files=blobs.map((b,i)=>new File([b],base+(blobs.length>1?'-'+(i+1):'')+'.png',{type:'image/png'}));
  if(canShare()&&navigator.canShare&&navigator.canShare({files})){
    try{ await navigator.share({files,text:base}); return; }
    catch(e){ if(e&&e.name==='AbortError')return; /* 그 외 실패 → 저장으로 전환 */ }
  }
  for(let i=0;i<files.length;i++){
    const url=URL.createObjectURL(blobs[i]);
    const a=document.createElement('a');a.href=url;a.download=files[i].name;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    if(i<files.length-1)await new Promise(r=>setTimeout(r,600));
  }
  toast(files.length>1?`${files.length}장 이미지로 저장했습니다 — 카톡에 첨부해 보내세요`:'이미지로 저장했습니다 — 카톡에 첨부해 보내세요');
}
function copyText(t,label){
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(t).then(()=>toast(label+' 복사됨')).catch(()=>fallbackCopy(t,label));
  } else fallbackCopy(t,label);
}
function fallbackCopy(t,label){
  try{
    const ta=document.createElement('textarea');ta.value=t;ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';document.body.appendChild(ta);
    ta.focus();ta.select();ta.setSelectionRange(0,t.length);
    const ok=document.execCommand('copy');document.body.removeChild(ta);
    if(ok)toast(label+' 복사됨'); else showCopyModal(t,label);
  }catch(e){showCopyModal(t,label);}
}
function showCopyModal(t,label){

function openPrint(html,land){

  // 에디토리얼 문서(.ed)는 여백 0 — 크림 종이가 가장자리까지 차고, 브라우저 머리글·바닥글(날짜·주소·쪽수)도 사라진다.

}
function showPreview(title,html,land){
  const pages=Array.isArray(html)?html:[html];
  /* 페이지 구분은 break-before — break-after 방식은 앞 페이지가 꽉 찼을 때
     구분용 빈 요소가 다음 장으로 밀리며 공페이지를 만든다 */
  const joined=pages.join('<div style="page-break-before:always;height:0"></div>');
  const isEdDoc=/class="ed[\s"]/.test(joined);
  syncEdPaper();
  const ov=document.createElement('div');ov.className='pv-overlay';
  ov.innerHTML=`<div class="pv-bar"><span class="ttl">${esc(title)} 미리보기 ${pages.length>1?`<span class="sub">· ${pages.length}장</span>`:''}</span><div style="flex:1"></div>
    ${isEdDoc?`<button class="btn" id="pvPaper">바탕 ${DB.edPaper==='white'?'흰색':'아이보리'}</button>`:''}
    <button class="btn green" id="pvShare">${svg(IC.share)}${canShare()?'카톡·문자로 보내기':'이미지로 저장'}</button>
    <button class="btn accent" id="pvPrint">${svg(IC.print)}인쇄 / PDF 저장</button>
    <button class="btn" id="pvClose">닫기</button></div>
    <div class="pv-scroll">${pages.map(pg=>`<div class="pv-page${land?' land':''}"><div class="psheet${land?' land':''}">${pg}</div></div>`).join('')}</div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('#pvClose').onclick=close;
  ov.querySelector('#pvPrint').onclick=()=>openPrint(joined,land);
  /* 미리보기 열릴 때 페이지별 이미지를 미리 생성 — 버튼은 누른 즉시 공유(권한 만료 방지) */
  let sheetBlobs=null;
  const genBlobs=()=>(async()=>{const out=[];for(const pg of pages){out.push(await sheetToBlob(pg,land));}return out;})()
    .then(bs=>{sheetBlobs=bs;return bs;}).catch(()=>null);
  let blobP=genBlobs();
  const pp=ov.querySelector('#pvPaper');
  if(pp)pp.onclick=()=>{ /* 아이보리 ↔ 흰색 — 미리보기·인쇄·이미지 모두 즉시 반영 */
    DB.edPaper=DB.edPaper==='white'?'':'white';save();syncEdPaper();
    pp.textContent='바탕 '+(DB.edPaper==='white'?'흰색':'아이보리');
    sheetBlobs=null;blobP=genBlobs();
  };
  const shBtn=ov.querySelector('#pvShare');
  const shOrig=shBtn.innerHTML;
  shBtn.onclick=async()=>{
    if(sheetBlobs){ shareBlobFiles(sheetBlobs,title); return; }
    shBtn.disabled=true; shBtn.textContent='이미지 준비 중…';
    const bs=await blobP;
    shBtn.disabled=false;
    if(!bs){ shBtn.innerHTML=shOrig; toast('이미지 생성 실패 — 인터넷 연결을 확인해 주세요'); return; }
    if(canShare()){ shBtn.textContent='✅ 준비 완료 — 눌러서 보내기'; }
    else { shBtn.innerHTML=shOrig; shareBlobFiles(bs,title); }
  };
  document.addEventListener('keydown',function k(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',k);}});
}

function vSchedule(c){

    if(sub==='mat')vMaterials(body); else if(sub==='ord')vOrders(body,true); else if(sub==='spec')vSpecbook(body,true); else if(sub==='labor')vLabor(body,p); else renderSiteSub(body,p);
    return;
  }
  const today=todayStr();
  // 공사 기간(시작~종료) 산출 — 공정/프로젝트 일정이 걸친 전체 구간
  let lo, hi;
  { const sds=p.schedule.map(s=>s.start).filter(Boolean).sort();
    const eds=p.schedule.map(s=>s.end).filter(Boolean).sort();
    lo=[p.info.start,sds[0]].filter(Boolean).sort()[0];
    hi=[p.info.end,eds[eds.length-1]].filter(Boolean).sort().slice(-1)[0]; }
  if(!lo||!hi){ const base=(p.info.start||today).slice(0,7); const [by,bm]=base.split('-').map(Number);
    lo=lo||`${base}-01`; hi=hi||dkey(new Date(by,bm,0)); }
  const view=state.schedView||'timeline';
  const scBody = view==='calendar' ? calMarkup(p,lo,hi,today) : ganttMarkup(p,lo,hi,today);
  const scN=p.schedule.length, scDone=p.schedule.filter(s=>s.status==='완료').length, scProg=p.schedule.filter(s=>s.status==='진행중').length;
  const todos=p.todos||[];
  c.innerHTML=`${subtabs}

/* 간트 타임라인 — 공정(행) × 날짜(열), 기간 막대. 인테리어 공정표 형식 */
function ganttMarkup(p,lo,hi,today){
  const dows=['일','월','화','수','목','금','토'];
  const days=[]; let cur=new Date(lo); const endD=new Date(hi); let g=0;
  while(cur<=endD&&g++<400){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const n=days.length;
  // 공정을 이름별로 묶어 행 구성(시작일 순)
  const order=[], by={};
  p.schedule.slice().sort((a,b)=>(a.start||'').localeCompare(b.start||'')||(a.end||'').localeCompare(b.end||''))
    .forEach(s=>{const key=s.phase||'기타'; if(!by[key]){by[key]=[];order.push(key);} by[key].push(s);});
  // 월 헤더 구간
  const months=[]; days.forEach(d=>{const my=d.getFullYear()+'-'+d.getMonth(); const last=months[months.length-1];
    if(last&&last.my===my)last.span++; else months.push({my,span:1,label:(d.getMonth()+1)+'월'});});
  const monthRow=months.map(mo=>`<div class="gmo" style="width:calc(var(--cw) * ${mo.span})">${mo.label}</div>`).join('');
  const dcell=(d,head)=>{const dow=d.getDay(),k=dkey(d),we=dow===0||dow===6||!!HOLIDAYS[k],td=k===today;
    return head
      ? `<div class="gcell gdcell ${we?'we':''} ${td?'gtd':''}"><span class="gdn ${dow===0?'s0':''} ${dow===6?'s6':''}">${d.getDate()}</span><span class="gdw">${dows[dow]}</span></div>`
      : `<div class="gcell ${we?'we':''} ${td?'gtd':''}"></div>`;};
  const dayHead=days.map(d=>dcell(d,true)).join('');
  const bgCells=days.map(d=>dcell(d,false)).join('');
  const idxOf=ds=>daysBetween(lo,ds);
  const rows=order.map(phase=>{
    const col=tradeColor(phase);
    const bars=by[phase].map(s=>{
      const si=Math.max(0,idxOf(s.start)), ei=Math.min(n-1,idxOf(s.end)), span=Math.max(1,ei-si+1);
      const st=s.status||'예정', dn=st==='완료';
      const label=esc(s.note||`${fdate(s.start)}~${fdate(s.end)}`);
      return`<div class="gbar st-${SCH_ST[st]||'neutral'} ${dn?'done':''}" style="left:calc(var(--cw) * ${si});width:calc(var(--cw) * ${span});background:${mix(col,dn?.14:.2)};border-color:${col};color:${col}" data-e-type="schedule" data-e-id="${s.id}" title="${esc(phase)} · ${esc(st)} · ${esc(s.start)}~${esc(s.end)}${s.note?' · '+esc(s.note):''}">${dn?`<span class="gck">${svg(IC.check)}</span>`:''}<span class="gbl">${label}</span></div>`;
    }).join('');
    return`<div class="grow"><div class="glabel"><span class="gdot" style="background:${col}"></span><span class="gpn">${esc(phase)}</span></div>
      <div class="gtrack"><div class="gcells gbg" style="grid-template-columns:repeat(${n},var(--cw))">${bgCells}</div>${bars}</div></div>`;
  }).join('') || `<div class="grow"><div class="glabel" style="color:var(--faint)">—</div><div class="gtrack" style="display:flex;align-items:center;padding-left:16px;color:var(--faint);font-size:12.5px">등록된 공정이 없습니다. 우측 상단 <b style="margin:0 4px">공정 추가</b>로 시작하세요.</div></div>`;
  return`<div class="gwrap"><div class="gantt" style="--n:${n}">
    <div class="grow ghrow"><div class="glabel ghcorner">공정</div>
      <div class="gtrack ghtrack"><div class="gmonrow">${monthRow}</div><div class="gcells gdrow" style="grid-template-columns:repeat(${n},var(--cw))">${dayHead}</div></div></div>
    ${rows}
  </div></div>`;
}

/* 연속 달력 — 공사기간 전체를 주 단위로 표시 */
function calMarkup(p,lo,hi,today){
  const dows=['일','월','화','수','목','금','토'];
  const loD=new Date(lo), hiD=new Date(hi);
  const start=new Date(loD); start.setDate(loD.getDate()-loD.getDay());
  const end=new Date(hiD); end.setDate(hiD.getDate()+(6-hiD.getDay()));
  const days=[]; const cur=new Date(start); while(cur<=end){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const cells=days.map((d,idx)=>{
    const k=dkey(d), dow=d.getDay(), inRange=k>=lo&&k<=hi, showMo=d.getDate()===1||idx===0;
    const items=p.schedule.filter(s=>s.start<=k&&k<=s.end);
    const chips=items.map(s=>{const col=tradeColor(s.phase);const dn=s.status==='완료';
      return`<div class="chip ${dn?'done':''}" style="background:${mix(col,.15)};color:${col}" data-e-type="schedule" data-e-id="${s.id}" title="${esc(s.phase)} (${s.status})">
        ${dn?`<span class="ck">${svg(IC.check)}</span>`:''}<span style="overflow:hidden;text-overflow:ellipsis">${esc(s.phase)}</span></div>`;}).join('');
    return`<div class="cell ${inRange?'':'out'} ${(d.getMonth()%2)?'alt':''} ${k===today?'today':''}" data-qadd="${k}" style="cursor:pointer" title="눌러서 공정 추가">
      <span class="dn ${dow===0?'s0':''} ${dow===6?'s6':''}">${d.getDate()}${showMo?`<span class="mlab">${d.getMonth()+1}월</span>`:''}</span>${HOLIDAYS[k]?`<span class="hol">${HOLIDAYS[k]}</span>`:''}
      <div class="chips">${chips}</div></div>`;
  }).join('');
  return`<div class="cal">${dows.map((d,i)=>`<div class="dow s${i}">${d}</div>`).join('')}${cells}</div>`;
}
/* ── 달력 날짜 클릭 → 빠른 공정 추가. 기본 공정은 원터치, 직접 입력도 가능 ── */

  ci.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addPhase(ci.value);ci.value='';}};

/* 기본 공정 목록 편집 — 이름 수정·삭제·추가 */

function todoHtml(t){return`<div class="todo ${t.done?'done':''}">

function shiftMonth(ym,d){let[y,m]=ym.split('-').map(Number);m+=d;if(m<1){m=12;y--;}if(m>12){m=1;y++;}return`${y}-${String(m).padStart(2,'0')}`;}

/* 공사 일정표 PDF — 공종(행) × 날짜(열) 간트 표, A4 가로 */
function printSchedule(){
  const p=proj(),i=p.info;
  const sds=p.schedule.map(s=>s.start).filter(Boolean).sort();
  const eds=p.schedule.map(s=>s.end).filter(Boolean).sort();
  const start=i.start||sds[0], end=i.end||eds[eds.length-1];
  if(!start||!end){showPreview('공사 일정표','<div style="padding:40px;text-align:center;color:#888">공사 기간과 공정을 먼저 입력하세요.</div>',true);return;}
  const days=[]; let cur=new Date(start); const endD=new Date(end); let g=0;
  while(cur<=endD&&g++<200){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const n=days.length;
  const dows=['일','월','화','수','목','금','토'];
  const isWe=d=>{const dow=d.getDay();return dow===0||dow===6||!!HOLIDAYS[dkey(d)];};
  // 공정을 이름별로 묶어 행 구성(시작일 순)
  const order=[], by={};
  p.schedule.slice().sort((a,b)=>(a.start||'').localeCompare(b.start||'')||(a.end||'').localeCompare(b.end||''))
    .forEach(s=>{const key=s.phase||'기타'; if(!by[key]){by[key]=[];order.push(key);} by[key].push(s);});
  const idxOf=ds=>daysBetween(start,ds);
  // 월 헤더(colspan)
  const months=[]; days.forEach(d=>{const my=d.getFullYear()+'-'+d.getMonth(); const last=months[months.length-1];
    if(last&&last.my===my)last.span++; else months.push({my,span:1,label:d.getFullYear()+'. '+(d.getMonth()+1)+'월'});});
  const monthTh=months.map(mo=>`<th class="pg-mo" colspan="${mo.span}">${mo.label}</th>`).join('');
  const dateTh=days.map(d=>{const dow=d.getDay(),we=isWe(d);
    return`<th class="pg-dt${dow===0?' sun':dow===6?' sat':''}${we?' pg-we':''}">${d.getDate()}<span class="dw">${dows[dow]}</span></th>`;}).join('');
  // 공정 막대 행 — 기간만큼 colspan으로 연속 채움
  const totalRows=Math.max(order.length,12);
  let rows='';
  for(let r=0;r<totalRows;r++){
    const ph=order[r];
    if(!ph){ const blanks=days.map(d=>`<td class="${isWe(d)?'pg-we':''}"></td>`).join('');
      rows+=`<tr><td class="pg-no">${r+1}</td><td class="pg-ph"></td>${blanks}<td class="pg-bigo"></td></tr>`; continue; }
    const col=tradeColor(ph); const segs=by[ph].slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    let cells=''; let idx=0;
    while(idx<n){
      const seg=segs.find(s=>idxOf(s.start)===idx);
      if(seg){ const ei=Math.min(n-1,idxOf(seg.end)); const span=Math.max(1,ei-idx+1);
        const dn=seg.status==='완료', late=seg.status==='지연';
        const bg=late?'rgba(210,75,62,.20)':mix(col,dn?.24:.42);
        cells+=`<td class="pg-bar" colspan="${span}" style="background:${bg}"><span class="pg-bl">${dn?'✓ ':''}${esc(seg.note||ph)}</span></td>`;
        idx+=span;
      } else { cells+=`<td class="${isWe(days[idx])?'pg-we':''}"></td>`; idx++; }
    }
    rows+=`<tr><td class="pg-no">${r+1}</td><td class="pg-ph"><span class="dot" style="background:${col}"></span>${esc(ph)}</td>${cells}<td class="pg-bigo"></td></tr>`;
  }
  const co=CO();
  const schLogo=docLogo(co.schedLogoPos||'오른쪽',110);
  const html=`${schLogo?`<div style="margin-bottom:8px">${schLogo}</div>`:''}
    <div class="pg-hd">
      <div class="pg-title">공 사 일 정 표</div>
      <table class="pg-meta">
        <tr><td class="k">공사명</td><td class="v">${esc(i.name)}</td><td class="k">공사기간</td><td class="v">${fdateF(start)} ~ ${fdateF(end)} (${weeks(start,end)}주)</td></tr>
        <tr><td class="k">현&nbsp;&nbsp;장</td><td class="v">${esc(i.address||i.siteInfo||'-')}</td><td class="k">담&nbsp;&nbsp;당</td><td class="v">${esc(i.manager||'-')}${i.contact?' / '+esc(i.contact):''}</td></tr>
      </table>
    </div>
    <table class="pgt">

      <thead>

/* ===== 스펙북 숨김 =====
   고객에게 안 보여줄 항목을 체크로 빼둔다. 같은 자재라도 현장마다 숨길지가

   화면에는 계속 보이고, 고객에게 나가는 스펙북 PDF에서만 빠진다. */
const sbHideArr=p=>(p.sbHide=p.sbHide||[]);
const sbHidden=(p,id)=>sbHideArr(p).indexOf(id)>=0;
function sbSetHidden(p,id,on){
  const a=sbHideArr(p), i=a.indexOf(id);
  if(on&&i<0)a.push(id); else if(!on&&i>=0)a.splice(i,1); else return;
  save();render();
}
const sbHideBox=(p,id,label)=>`<label class="no-print" title="체크하면 고객에게 나가는 스펙북 PDF에서 빠집니다" style="display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;color:var(--sub);white-space:nowrap"><input type="checkbox" data-sbhide="${id}" ${sbHidden(p,id)?'checked':''}>${label||''}</label>`;
/* 숨김 체크박스를 실제로 동작하게 연결한다. 각 화면 렌더 끝에서 호출한다. */
function wireHide(c,p){
  c.querySelectorAll('[data-sbhide]').forEach(el=>{
    el.onclick=ev=>ev.stopPropagation();   /* 카드 전체가 클릭 대상인 곳에서 편집창이 같이 열리지 않게 */
    el.onchange=ev=>{ev.stopPropagation();sbSetHidden(p,el.dataset.sbhide,el.checked);};
  });
}

/* ── 마감재 스펙북 — 표지 + 그룹별 사양표를 A4 여러 장으로 자동 분할 ── */
function specbookPages(p,sp){
  const i=p.info;
  /* 숨김 체크한 항목은 고객에게 나가는 문서에서 뺀다 — 합계도 남은 것만으로 낸다 */
  const mats=(p.materials||[]).filter(m=>!sbHidden(p,m.id));
  const shownTotal=mats.reduce((s,m)=>s+matAmt(m),0);
  const groups=[...new Set(mats.map(m=>m.group))];
  const pageHead=`${edTop(edDateNo(todayStr()))}
    <div class="ed-hrow"><div>${edTitle('Spec Book.','마 감 재  스 펙 북')}</div>
      <div class="ed-hmeta">${esc(i.name||'')}<br>${esc(edDot(todayStr()))}</div></div>`;
  const cols=[{h:'사진',w:'width:62px'},{h:'공정',w:'width:10%'},{h:'품명',w:''},{h:'규격 / 컬러',w:'width:20%'},{h:'수량',w:'width:9%'},
    ...(sp?[{h:'단가',w:'width:10%',r:1},{h:'금액',w:'width:11%',r:1}]:[]),
    {h:'비고',w:sp?'width:11%':'width:15%'}];
  const thRow=`<tr>${cols.map(cl=>`<th class="${cl.r?'n':''}" style="${cl.w}">${cl.h}</th>`).join('')}</tr>`;
  const rowHtml=m=>`<tr>
    <td style="padding:6px">${m.img?`<img src="${m.img}" style="width:50px;height:50px;object-fit:cover;display:block">`:`<div style="width:50px;height:50px;background:#EFEAE0;-webkit-print-color-adjust:exact;print-color-adjust:exact"></div>`}</td>
    <td class="etc" style="font-size:9px;letter-spacing:.08em">${esc(m.phase||'—')}</td>
    <td><b style="font-size:11px">${esc(m.name)}</b>${m.brand?`<div class="ed-det">${esc(m.brand)}</div>`:''}${(m.detail||'').trim()?`<div class="ed-det" style="white-space:pre-wrap">${esc(m.detail)}</div>`:''}</td>
    <td class="etc">${esc(m.spec||'')||'<span class="dash">—</span>'}</td>
    <td class="etc">${m.qty?esc(m.qty)+' '+esc(m.unit||''):'<span class="dash">—</span>'}</td>
    ${sp?`<td class="n">${+m.price?numf(m.price):'<span class="dash">—</span>'}</td>
    <td class="n" style="font-weight:700">${matAmt(m)?numf(matAmt(m)):'<span class="dash">—</span>'}</td>`:''}
    <td class="etc">${esc(m.note||'')||'<span class="dash">—</span>'}</td></tr>`;
  const totalHtml=`<div data-sbtotal class="ed-tots"><div class="tr grand"><span>합 계</span><b>${numf(shownTotal)}<i>원</i></b></div></div>`;

  /* ── 페이지 분할 ──
     예전엔 행 높이를 70px로 추정해 나눴는데, 실제 행은 그보다 낮아서
     페이지마다 2~3행 분량의 여백이 남았다. 그래서 화면 밖에 실제 페이지를
     그려놓고 scrollHeight 를 재서 "더 안 들어갈 때까지" 채우는 방식으로 바꿨다. */
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;left:-99999px;top:0;visibility:hidden;pointer-events:none;z-index:-1';
  const outer=document.createElement('div');
  outer.className='pv-page'; outer.style.minHeight='0'; outer.style.boxShadow='none';
  const inner=document.createElement('div'); inner.className='psheet';
  outer.appendChild(inner); stage.appendChild(outer); document.body.appendChild(stage);

  /* mm→px 는 브라우저 확대배율에 따라 달라지므로 그때그때 실측 */
  const ruler=document.createElement('div');
  ruler.style.cssText='height:100mm;position:absolute;visibility:hidden';
  stage.appendChild(ruler);
  const pxPerMm=(ruler.getBoundingClientRect().height||377.95)/100;
  ruler.remove();
  const MAXH=250*pxPerMm;            /* 내용 262mm − 하단 회사 푸터 몫 12mm */

  const pages=[];
  let edEl=null, tbody=null, pageEmpty=true;
  const overflow=()=>inner.scrollHeight>MAXH;
  const newPage=()=>{inner.innerHTML=`<div class="ed autoh">${pageHead}</div>`;edEl=inner.firstElementChild;tbody=null;pageEmpty=true;};
  const pushPage=()=>{if(inner.querySelector('table,[data-sbtotal]')){edEl.insertAdjacentHTML('beforeend',edFoot());pages.push(inner.innerHTML);}};
  const startSec=(g,cont,n,num)=>{
    edEl.insertAdjacentHTML('beforeend',`<div class="ed-sech"><span class="sn">${String(num).padStart(2,'0')}</span>${esc(g)}${cont?' <small>(계속)</small>':''}${n?` <small>· ${n}개</small>`:''}</div>`);
    edEl.insertAdjacentHTML('beforeend',`<table class="edt"><thead>${thRow}</thead><tbody></tbody></table>`);
    tbody=edEl.lastElementChild.querySelector('tbody');
  };
  const dropSec=()=>{const t=edEl.lastElementChild;const h=t.previousElementSibling;t.remove();if(h&&h.classList.contains('ed-sech'))h.remove();tbody=null;};

  newPage();
  groups.forEach((g,gi)=>{
    const items=mats.filter(m=>m.group===g);
    let idx=0, cont=false;
    while(idx<items.length){
      startSec(g,cont,cont?0:items.length,gi+1);
      let placed=0;
      while(idx<items.length){
        tbody.insertAdjacentHTML('beforeend',rowHtml(items[idx]));
        /* 빈 페이지에서는 넘치더라도 최소 한 행은 넣는다 — 안 그러면 무한루프 */
        if(overflow()&&!(pageEmpty&&placed===0)){tbody.lastElementChild.remove();break;}
        idx++;placed++;
      }
      if(placed>0)pageEmpty=false; else dropSec();   /* 헤더만 들어가고 행이 안 들어간 경우 */
      /* (계속)은 이 그룹이 앞 페이지에서 이어질 때만 — 통째로 밀린 경우는 아니다 */
      if(idx<items.length){pushPage();newPage();cont=idx>0;}
    }
  });
  if(sp&&shownTotal){
    edEl.insertAdjacentHTML('beforeend',totalHtml);
    if(overflow()&&!pageEmpty){
      edEl.lastElementChild.remove();
      pushPage();newPage();
      edEl.insertAdjacentHTML('beforeend',totalHtml);
    }
  }
  pushPage();
  stage.remove();
  return pages;
}
function openSpecbook(){
  const p=proj();
  if(!(p.materials||[]).length){toast('등록된 마감재가 없습니다');return;}
  if(!(p.materials||[]).some(m=>!sbHidden(p,m.id))){toast('마감재가 모두 숨김 처리되어 있습니다 — 숨김 체크를 하나 이상 해제해 주세요');return;}
  showPreview('마감재 스펙북',specbookPages(p,!!state.sbPrice),false);
}

        ${dw.map(w=>{const l=+w.labor||0,net=l-Math.round(l*0.033);return`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;flex-wrap:wrap">

    ov.innerHTML=`<img src="${img.src}" style="max-width:92vw;max-height:88vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.4)">`;

/* ── 작업자 출력 체크 — 등록된 작업자를 눌러 그날 출력 추가/해제 ── */
/* 현장 출력 기록의 인적사항을 회사 작업자 명부에 자동 반영 */
function upsertWorkerDB(w){
  if(!w||!w.name)return;DB.workersDB=DB.workersDB||[];
  let r=DB.workersDB.find(x=>x.name===w.name);
  if(!r){r={id:uid(),name:w.name};DB.workersDB.push(r);}
  ['trade','labor','ssn','phone','bank','account','address'].forEach(f=>{if(w[f])r[f]=w[f];});
}
function openWorkerCheck(date){
  const p=proj();p.workers=p.workers||[];
  const ov=document.createElement('div');ov.className='overlay';
  /* 작업자 명부(회사 공용) + 이 현장 기록을 합쳐 이름별 최신 정보 구성 */
  const uniq=()=>{const m={};
    (DB.workersDB||[]).forEach(w=>{if(w.name)m[w.name]=Object.assign({},w);});
    p.workers.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(w=>{if(w.name)m[w.name]=Object.assign(m[w.name]||{},w);});
    return Object.values(m).sort((a,b)=>a.name.localeCompare(b.name));};
  const build=()=>{
    const us=uniq();
    return us.length?us.map(u=>{
      const on=p.workers.some(w=>w.date===date&&w.name===u.name);
      return`<button class="btn ${on?'green':''}" data-wname="${esc(u.name)}" style="justify-content:flex-start">
        ${on?'✓ ':''}${esc(u.name)}${u.trade?`&nbsp;<span style="font-size:11px;opacity:.75">${esc(u.trade)}</span>`:''}${+u.labor?`&nbsp;<span class="num" style="font-size:11px;opacity:.75">${numf(+u.labor)}원</span>`:''}</button>`;
    }).join(''):'<div class="sub" style="padding:8px 0">아직 등록된 작업자가 없습니다. 아래 "새 작업자"로 시작하세요.</div>';
  };
  ov.innerHTML=`<div class="modal" style="width:min(520px,100%)"><h2>작업자 출력 체크 · <span class="num">${fdateF(date)}</span></h2>
    <div class="msub">이름을 누르면 그날 출력으로 추가되고, 다시 누르면 빠집니다. 단가·주민번호·계좌는 마지막 기록을 그대로 가져옵니다.</div>
    <div id="wcList" style="padding:6px 22px 4px;display:flex;flex-direction:column;gap:6px;max-height:46vh;overflow-y:auto">${build()}</div>
    <div class="modal-foot"><button class="btn" id="wcNew">${svg(IC.plus)}새 작업자</button><div class="right"><button class="btn green" id="wcDone">완료</button></div></div></div>`;
  document.body.appendChild(ov);
  const close=()=>{ov.remove();render();};
  ov.addEventListener('mousedown',e=>{if(e.target===ov)close();});
  ov.querySelector('#wcDone').onclick=close;
  ov.querySelector('#wcNew').onclick=()=>{ov.remove();openForm('workers',null,{date});};
  const wireList=()=>ov.querySelectorAll('[data-wname]').forEach(b=>b.onclick=()=>{
    const nm=b.dataset.wname;
    const ex=p.workers.find(w=>w.date===date&&w.name===nm);
    if(ex)p.workers=p.workers.filter(w=>w.id!==ex.id);
    else{const u=uniq().find(x=>x.name===nm)||{};
      const nw={id:uid(),date,name:nm,trade:u.trade||'',labor:u.labor||'',expense:'',ssn:u.ssn||'',phone:u.phone||'',bank:u.bank||'',account:u.account||'',address:u.address||'',memo:''};
      p.workers.push(nw);upsertWorkerDB(nw);}
    save();ov.querySelector('#wcList').innerHTML=build();wireList();
  });
  wireList();
}

/* ── 노무비 — 월별 일용노무비 지급명세서 (3.3% = 소득세 3% + 지방소득세 0.3%) ── */
function laborCalc(labor){const l=+labor||0,tax=Math.round(l*0.03),ltax=Math.round(l*0.003);return{l,tax,ltax,ded:tax+ltax,net:l-tax-ltax};}
function laborMonthData(p,ym){
  const rows=(p.workers||[]).filter(w=>(w.date||'').slice(0,7)===ym);
  const by={};
  rows.forEach(w=>{const k=w.name||'—';const o=by[k]=by[k]||{name:k,days:[],dates:[],labor:0,exp:0};
    o.days.push(+w.date.slice(8,10));o.dates.push(w.date);o.labor+=+w.labor||0;o.exp+=+w.expense||0;
    ['ssn','phone','bank','account','address','trade'].forEach(f=>{if(w[f])o[f]=w[f];});});
  const people=Object.values(by).sort((a,b)=>a.name.localeCompare(b.name));
  people.forEach(o=>{o.days.sort((a,b)=>a-b);Object.assign(o,laborCalc(o.labor));o.avg=o.days.length?Math.round(o.labor/o.days.length):0;});
  const tot={n:people.length,days:0,labor:0,tax:0,ltax:0,ded:0,net:0,exp:0};
  people.forEach(o=>{tot.days+=o.days.length;tot.labor+=o.labor;tot.tax+=o.tax;tot.ltax+=o.ltax;tot.ded+=o.ded;tot.net+=o.net;tot.exp+=o.exp;});
  return{rows,people,tot};
}
function vLabor(body,p){
  p.workers=p.workers||[];
  const months=[...new Set(p.workers.map(w=>(w.date||'').slice(0,7)))].filter(Boolean).sort();
  const ym=state.laborMonth||months[months.length-1]||todayStr().slice(0,7);
  state.laborMonth=ym;
  const[Y,M]=ym.split('-').map(Number);
  const{rows,people,tot}=laborMonthData(p,ym);
  const trs=people.map(o=>`<tr>
      <td class="strong">${esc(o.name)}${o.trade?`<br><span class="tag">${esc(o.trade)}</span>`:''}</td>

/* ── 출력일 달력 보기 — 출력일수를 눌렀을 때 달력에 표시 ── */
function openWorkerDaysCal(name,dates){
  const byM={};dates.forEach(d=>{(byM[d.slice(0,7)]=byM[d.slice(0,7)]||new Set()).add(+d.slice(8,10));});
  const months=Object.keys(byM).sort();
  const calM=ym=>{
    const[y,m]=ym.split('-').map(Number);
    const first=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate();
    let cells='';for(let i=0;i<first;i++)cells+='<span></span>';
    for(let d=1;d<=dim;d++){const on=byM[ym].has(d);
      cells+=`<span class="num" style="display:grid;place-items:center;height:30px;border-radius:8px;${on?'background:var(--green);color:#fff;font-weight:700':'color:var(--muted)'}">${d}</span>`;}
    return`<div><div style="font-weight:700;margin:2px 0 7px;text-align:center" class="num">${y}년 ${m}월 <span class="sub" style="font-weight:500">(${byM[ym].size}일 출력)</span></div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:12px;text-align:center">
      ${['일','월','화','수','목','금','토'].map((w,i)=>`<span style="font-weight:700;color:${i===0?'var(--bad)':i===6?'#3F5BB0':'var(--faint)'}">${w}</span>`).join('')}${cells}</div></div>`;
  };
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="width:min(${months.length>1?740:420}px,100%)"><h2>${esc(name)} 출력일 <span class="sub" style="font-size:12px;font-weight:500">총 ${dates.length}일</span></h2>
    <div style="padding:8px 22px 12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-height:62vh;overflow-y:auto">${months.map(calM).join('')}</div>
    <div class="modal-foot"><span></span><div class="right"><button class="btn green" id="wdClose">닫기</button></div></div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('mousedown',e=>{if(e.target===ov)close();});
  ov.querySelector('#wdClose').onclick=close;
}

/* ===== 노무비 (회사 전체 탭) — 현장 기록이 달→분기→년으로 모입니다 ===== */
function vLaborCo(c){
  DB.workersDB=DB.workersDB||[];
  const unit=state.laborUnit||'m';
  /* 모든 현장의 출력 기록 수집 (현장관리에서 입력한 데이터가 원본) */
  const all=[];DB.projects.forEach(pr=>(pr.workers||[]).forEach(w=>{if(w.date)all.push(Object.assign({},w,{_pid:pr.id,_pname:pr.info.name||'현장'}));}));
  const perOf=d=>unit==='m'?d.slice(0,7):unit==='q'?`${d.slice(0,4)}-Q${Math.ceil(+d.slice(5,7)/3)}`:d.slice(0,4);
  const perLabel=pp=>unit==='m'?`${+pp.slice(0,4)}년 ${+pp.slice(5,7)}월`:unit==='q'?`${pp.slice(0,4)}년 ${pp.slice(6)}분기`:`${pp}년`;
  const shiftPer=(pp,dir)=>{
    if(unit==='m')return shiftMonth(pp,dir);
    if(unit==='q'){let[y,q]=pp.split('-Q').map(Number);q+=dir;if(q<1){q=4;y--;}if(q>4){q=1;y++;}return`${y}-Q${q}`;}
    return String(+pp+dir);

  const pers=[...new Set(all.map(w=>perOf(w.date)))].sort();
  /* 단위(월/분기/년)에 맞는 기간이 아니면 최근 기간으로 */

    o.dates.push(w.date);o.labor+=+w.labor||0;o.exp+=+w.expense||0;o.sites[w._pname]=1;
    ['ssn','phone','bank','account','trade'].forEach(f=>{if(w[f])o[f]=w[f];});});

    o.names[w.name||'—']=1;o.days++;o.labor+=+w.labor||0;o.exp+=+w.expense||0;});

  /* 작업자 명부 */
  const reg=DB.workersDB.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const seg=(u,l)=>`<button data-lbu="${u}" class="${unit===u?'on':''}">${l}</button>`;
  c.innerHTML=`
  <div class="vhead"><div><div class="t">노무비</div><div class="d">현장관리에서 기록한 작업자 출력이 <b>달 → 분기 → 년</b>으로 모입니다. 현장별 기록·수정은 각 현장의 노무비 탭에서 하세요.</div></div><div class="spacer"></div>

  <div class="calbar">

    <div class="mo num" style="min-width:auto">${perLabel(per)}</div>
    <button class="btn sm" id="lcNext">›</button>
    <div style="flex:1"></div>

/* ── 노무비 엑셀(.xlsx) — 일용노무비 지급명세서 양식으로 내보내기 ── */

  let r=blank();r[0]=`${Y}년 ${M}월 일용노무비 지급명세서`;aoa.push(r);M2(0,0,0,NCOL-1);
  r=blank();r[0]='현장명';r[1]=p.info.name||'';r[4]=`${Y}. ${M}. 1 ~ ${Y}. ${M}. ${dim} (${dim}일간)`;r[21]='관리자';r[22]=p.info.manager||'';r[24]='작성자';r[25]=co.ceo||'';aoa.push(r);
  M2(1,1,1,3);M2(1,4,1,19);M2(1,22,1,23);M2(1,25,1,26);
  /* 표 머리 2줄 */
  r=blank();r[0]='성명';r[1]='주민(외국인)등록번호';r[2]='은행명';r[3]='계좌번호';
  for(let d2=1;d2<=15;d2++)r[3+d2]=d2;
  r[20]='출력일수';r[21]='노임단가';r[22]='총 지급액';r[23]='소득세';r[24]='국민연금';r[25]='건강보험';r[26]='기타공제';r[27]='실 지급액';r[28]='경비';aoa.push(r);
  r=blank();r[1]='연락처';r[2]='주소';
  for(let d2=16;d2<=31;d2++)r[d2-12]=d2<=dim?d2:'';
  r[20]='출력공수';r[23]='지방소득세';r[24]='고용보험';r[25]='장기요양';r[26]='공제합계';aoa.push(r);
  M2(2,0,3,0);M2(3,2,3,3);M2(2,21,3,21);M2(2,22,3,22);M2(2,27,3,27);M2(2,28,3,28);
  /* 합계 2줄 */
  r=blank();r[0]='합계';r[1]=`(${Y}년 ${M}월)`;r[2]=`출역인원 : ${tot.n}명`;r[20]=tot.days;r[21]='평균단가';r[22]=tot.labor;r[23]=tot.tax;r[27]=tot.net;r[28]=tot.exp;aoa.push(r);
  r=blank();r[20]=tot.days;r[21]=tot.days?Math.round(tot.labor/tot.days):'';r[23]=tot.ltax;r[26]=tot.ded;aoa.push(r);
  M2(4,0,5,0);M2(4,1,5,1);M2(4,2,5,3);M2(4,27,5,27);M2(4,28,5,28);
  /* 작업자 2줄씩 */
  let ri=6;
  people.forEach(o=>{
    const a=blank(),b=blank();
    a[0]=o.name;a[1]=o.ssn||'';a[2]=o.bank||'';a[3]=o.account||'';
    b[1]=o.phone||'';b[2]=o.address||'';
    o.days.forEach(d2=>{if(d2<=15)a[3+d2]='●';else b[d2-12]='●';});
    a[20]=o.days.length;b[20]=o.days.length;
    a[21]=o.avg;a[22]=o.labor;a[23]=o.tax;b[23]=o.ltax;b[26]=o.ded;a[27]=o.net;a[28]=o.exp||'';
    aoa.push(a,b);
    M2(ri,0,ri+1,0);M2(ri+1,2,ri+1,3);M2(ri,21,ri+1,21);M2(ri,22,ri+1,22);M2(ri,27,ri+1,27);M2(ri,28,ri+1,28);
    ri+=2;
  });
  const sh=XLSX.utils.aoa_to_sheet(aoa);
  sh['!merges']=merges;
  sh['!cols']=[{wch:9},{wch:17},{wch:11},{wch:15},...Array(16).fill({wch:3.2}),{wch:8},{wch:10},{wch:11},{wch:9},{wch:9},{wch:9},{wch:9},{wch:11},{wch:9}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,sh,`${M}월 지급명세서`);
  /* 시트2 — 일자별 상세 */
  const det=[['날짜','이름','공정','노임단가','소득세(3%)','지방소득세(0.3%)','공제합계','실지급액','경비','비고'],
    ...rows.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(w=>{const c=laborCalc(w.labor);
      return[w.date||'',w.name||'',w.trade||'',c.l,c.tax,c.ltax,c.ded,c.net,+w.expense||'',w.memo||''];})];
  const sh2=XLSX.utils.aoa_to_sheet(det);
  sh2['!cols']=[{wch:11},{wch:9},{wch:9},{wch:10},{wch:10},{wch:12},{wch:10},{wch:11},{wch:9},{wch:18}];
  XLSX.utils.book_append_sheet(wb,sh2,'일자별 상세');
  XLSX.writeFile(wb,`일용노무비_지급명세서_${(p.info.name||'현장').replace(/[\\/:*?"<>|]/g,'')}_${Y}-${String(M).padStart(2,'0')}.xlsx`);
}

/* ── 파일명에 못 쓰는 문자 제거 ── */
const safeName=s=>String(s||'').replace(/[\\/:*?"<>|]/g,'').trim();

/* ── 엑셀(.xls) 저장 — 앱 문서와 똑같은 모양의 표를 엑셀이 그대로 열도록 HTML로 내보냄 ── */
function downloadExcelHtml(filename,bodyHtml){
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>문서</x:Name><x:WorksheetOptions><x:Print><x:ValidPrinterInfo/></x:Print></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>${bodyHtml}</body></html>`;
  const blob=new Blob([String.fromCharCode(0xFEFF)+html],{type:'application/vnd.ms-excel'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
/* 엑셀 셀 스타일 (앱 견적서·발주서 디자인 그대로) */
const XB='border:.5pt solid #b7bfb6;';

const xth=`style="${XB}background:#3E5A43;color:#ffffff;font-weight:bold;padding:4px 7px;text-align:center"`;
const xlb=`style="${XB}background:#EFF3EE;font-weight:bold;padding:4px 7px;color:#2b402f"`;
const xtd=`style="${XB}padding:4px 7px"`;

/* ── 견적서 엑셀 — 앱 견적서(갑지+내역서)와 동일한 레이아웃 ── */
function exportEstXlsx(est){
  const p=proj(),cal=estCalc(est),co=CO(),isCon=est.type==='construction';
  const W=isCon?11:8;
  const band=t=>`<tr><td colspan="${W}" style="background:#3E5A43;color:#ffffff;font-weight:bold;letter-spacing:6px;padding:5px 9px">${t}</td></tr>`;
  const srow=(label,amt,bold,green)=>`<tr><td colspan="${W-2}" style="${XB}padding:4px 9px;${bold?'font-weight:bold;':''}${green?'background:#EFF3EE;':''}">${label}</td><td style="${XB}text-align:center;${green?'background:#EFF3EE;':''}">₩</td><td style="${XB}padding:4px 7px;${XNUM}${bold?'font-weight:bold;':''}${green?'background:#EFF3EE;':''}">${amt}</td></tr>`;
  /* 상단 정보 — 앱과 같은 좌(Client) / 우(Supplier) 구성 */
  const py=+String(est.sizePy||'').replace(/[^0-9.]/g,'')||0;
  const L=[['Client',esc(est.client||p.info.client||'')],['Project Name',esc(p.info.name||'')],['Size',py?py+'PY / '+Math.round(py*3.3058)+'㎡':''],['Quotion date',ymdKor(est.date)]];
  const R=[['Supplier',esc(co.name||'')],['Office',esc(co.addr||'')],['Quotion Writer',esc(co.ceo||'')+' 대표'],['TEL',esc(co.tel||'')],['E-mail',esc(co.email||'')],['Business',esc(co.biz||'')+' · '+esc(co.bizType||'')]];
  const lw=Math.ceil((W-2)/2),rw=W-2-lw;
  let info='';
  for(let i=0;i<R.length;i++){
    const l=L[i]||['',''];
    info+=`<tr><td ${xlb}>${l[0]}</td><td ${xtd} colspan="${lw}">${l[1]}</td><td ${xlb}>${R[i][0]}</td><td ${xtd} colspan="${rw}">${R[i][1]}</td></tr>`;
  }
  let h=`<table style="border-collapse:collapse;font-family:'Malgun Gothic';font-size:10pt">`;
  h+=`<tr><td colspan="${W}" style="font-size:19pt;font-weight:bold;letter-spacing:9px;padding:6px 0;color:#171C26">견 적 서 <span style="font-size:9pt;color:#4A7C50;letter-spacing:2px">ESTIMATE</span></td></tr>`;
  h+=info;
  h+=`<tr><td colspan="${W}" style="padding:3px"></td></tr>`;
  h+=band('직 접 공 사');
  cal.secs.forEach((s,i)=>{h+=srow(`Section ${String(i+1).padStart(2,'0')}: &nbsp;${esc(s.name||'-')}`,s.total);});
  h+=srow('직접공사비 계',cal.direct,1,1);
  if(isCon){
    h+=band('간 접 공 사');
    cal.ind.forEach(x=>{h+=srow(esc(x[0]),x[1]);});
    h+=srow('간접공사비 계',cal.indirect,1,1);
  }
  h+=srow('Sub TOTAL',cal.sub,1);
  h+=srow('Discount',cal.discount?-cal.discount:'',!!cal.discount);
  if(cal.cut)h+=srow('단수정리',-cal.cut,1);
  h+=srow('Tax: VAT 10%',est.vat==='포함'?Math.round(cal.grand*0.1):'');
  h+=`<tr><td colspan="${W-2}" style="background:#4A7C50;color:#ffffff;font-weight:bold;letter-spacing:3px;padding:6px 9px">GRAND TOTAL</td><td style="background:#4A7C50;color:#ffffff;text-align:center">₩</td><td style="background:#4A7C50;color:#ffffff;font-weight:bold;padding:6px 7px;${XNUM}">${cal.grand}</td></tr>`;
  h+=`<tr><td colspan="${W}" style="padding:3px 0;color:#555;font-size:9pt">비고/REMARK &nbsp; ${esc(est.remarks||'').replace(/\n/g,'<br>')}</td></tr>`;
  h+=`<tr><td colspan="${W}" style="color:#555;font-size:9pt">성명: ${esc(co.ceo||'')} (인) &nbsp;·&nbsp; ※ 본 견적서는 발행일로 ${est.validDays||30}일 유효합니다. &nbsp;·&nbsp; Company Registration No. ${esc(co.reg||'')}</td></tr>`;
  /* 내역서 — 앱 상세표와 같은 2줄 헤더 */
  h+=`<tr><td colspan="${W}" style="padding:10px 0 2px;font-size:13pt;font-weight:bold;color:#171C26">내 역 서</td></tr>`;
  if(isCon){
    h+=`<tr><td ${xth} rowspan="2">Description</td><td ${xth} rowspan="2">세부내역</td><td ${xth} rowspan="2">Size</td><td ${xth} rowspan="2">Unit</td><td ${xth} rowspan="2">Qty</td><td ${xth} colspan="2">Material (자재)</td><td ${xth} colspan="2">Labor (노무)</td><td ${xth} rowspan="2">합 계</td><td ${xth} rowspan="2">TOTAL</td></tr>`;
    h+=`<tr><td ${xth}>단가</td><td ${xth}>금액</td><td ${xth}>단가</td><td ${xth}>금액</td></tr>`;
    est.sections.forEach((sec,si)=>{
      h+=`<tr><td colspan="${W}" style="${XB}background:#EFF3EE;font-weight:bold;padding:4px 8px">Section ${String(si+1).padStart(2,'0')}: ${esc(sec.name||'-')}</td></tr>`;
      (sec.items||[]).forEach(it=>{
        const q=+it.qty||0,mp=+it.mp||0,lp=+it.lp||0;
        if(!it.name&&!q)return;
        h+=`<tr><td ${xtd}>${esc(it.name)}</td><td ${xtd}>${esc(it.detail||'')}</td><td ${xtd}>${esc(it.spec)}</td><td ${xtc}>${esc(it.unit)}</td><td ${xtn}>${q||''}</td><td ${xtn}>${mp||''}</td><td ${xtn}>${mp*q||''}</td><td ${xtn}>${lp||''}</td><td ${xtn}>${lp*q||''}</td><td ${xtn}>${(mp+lp)||''}</td><td ${xtn}>${(mp+lp)*q||''}</td></tr>`;
      });
      h+=`<tr><td colspan="${W-1}" style="${XB}font-weight:bold;padding:4px 8px;text-align:right">Section ${si+1} TOTAL</td><td style="${XB}font-weight:bold;${XNUM}">${cal.secs[si].total}</td></tr>`;
    });
  }else{
    h+=`<tr><td ${xth}>NO</td><td ${xth}>품명</td><td ${xth}>세부내역</td><td ${xth}>규격</td><td ${xth}>단위</td><td ${xth}>수량</td><td ${xth}>단가</td><td ${xth}>금액</td></tr>`;
    const items=(est.sections[0]?est.sections[0].items:[]).filter(it=>it.name||+it.qty);
    items.forEach((it,idx)=>{const q=+it.qty||0,a=(+it.mp||0)*q;
      h+=`<tr><td ${xtc}>${idx+1}</td><td ${xtd}>${esc(it.name)}</td><td ${xtd}>${esc(it.detail||'')}</td><td ${xtd}>${esc(it.spec)}</td><td ${xtc}>${esc(it.unit)}</td><td ${xtn}>${q||''}</td><td ${xtn}>${+it.mp||''}</td><td ${xtn}>${a||''}</td></tr>`;});
    h+=`<tr><td colspan="7" style="${XB}font-weight:bold;padding:4px 8px;text-align:right">합계${cal.discount?' (할인 −₩'+numf(cal.discount)+' 반영)':''}</td><td style="${XB}font-weight:bold;${XNUM}">${cal.grand}</td></tr>`;
  }
  h+=`</table>`;
  downloadExcelHtml(`견적서_${safeName(p.info.name||est.client||'현장')}_${est.date||todayStr()}.xls`,h);
}

/* ── 발주서 엑셀 — 앱 발주서와 동일한 레이아웃 ── */
function exportOrderXlsx(po){
  const p=proj(),items=p.orders.filter(o=>o.po===po);
  if(!items.length)return;
  const co=CO(),sp=!!items[0].showPrice;
  const qtySum=items.reduce((s,o)=>s+(+o.qty||0),0);
  const total=items.reduce((s,o)=>s+(+o.qty||0)*(+o.price||0),0);
  const W=sp?7:6;
  let h=`<table style="border-collapse:collapse;font-family:'Malgun Gothic';font-size:10pt">`;
  h+=`<tr><td colspan="${W}" style="font-size:19pt;font-weight:bold;letter-spacing:9px;padding:6px 0;color:#171C26">발 주 서 <span style="font-size:9pt;color:#4A7C50;letter-spacing:2px">PURCHASE ORDER</span></td></tr>`;
  const half=Math.floor(W/2);
  h+=`<tr><td ${xlb}>발주번호</td><td ${xtd} colspan="${half-1}">${esc(po)}</td><td ${xlb}>발주일</td><td ${xtd} colspan="${W-half-1}">${items[0].orderDate||'—'}</td></tr>`;
  h+=`<tr><td ${xlb}>현&nbsp;&nbsp;장</td><td ${xtd} colspan="${half-1}">${esc(p.info.name||'')}</td><td ${xlb}>납기일</td><td ${xtd} colspan="${W-half-1}">${items[0].dueDate||'—'}</td></tr>`;

/* ── 워드(.doc) 저장 — Word가 바로 여는 HTML 문서 ── */
function downloadWordDoc(filename,bodyHtml){
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]--><style>@page{size:A4;margin:14mm 13mm}body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:11pt;color:#222;line-height:1.6}table{border-collapse:collapse}</style></head><body>${bodyHtml}</body></html>`;
  const blob=new Blob(['﻿'+html],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}

/* ── 아파트 공사 안내문 — 엘리베이터·1층 현관 게시용 A4 ── */
function noticeData(p){
  const i=p.info;
  const phases=[...new Set(p.schedule.map(s=>s.phase).filter(Boolean))];
  /* 고소음 공정(철거·목공·타일)은 일정에서 날짜를 읽어와 소음 안내에 자동 반영
     — 같은 공정은 하나로 묶고, 이어지는 기간은 병합, 날짜는 07.21 형식으로 통일 */
  const NOISY_PHASES=['철거','목공','타일'];
  const DAY=86400000;
  const tms=s=>{if(!s)return null;const m=String(s).trim().replace(/\./g,'-').match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(!m)return null;const t=new Date(+m[1],+m[2]-1,+m[3]).getTime();return isNaN(t)?null:t;};
  const fmd=t=>{const dt=new Date(t);return`${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;};
  const noisyGroups=NOISY_PHASES.map(k=>{
    const ivs=p.schedule.filter(s=>(s.phase||'').includes(k)).map(s=>{
      const a=tms(s.start),b=tms(s.end);
      return a==null?null:{a,b:(b!=null&&b>a)?b:a};
    }).filter(Boolean).sort((x,y)=>x.a-y.a);
    const merged=[];
    ivs.forEach(iv=>{const L=merged[merged.length-1];
      if(L&&iv.a-L.b<=DAY){if(iv.b>L.b)L.b=iv.b;}else merged.push({...iv});});
    return{k,merged};
  }).filter(g=>g.merged.length).sort((x,y)=>x.merged[0].a-y.merged[0].a);
  const noisyTxt=noisyGroups.map(g=>`${g.k} ${g.merged.map(iv=>iv.a===iv.b?fmd(iv.a):`${fmd(iv.a)}~${fmd(iv.b)}`).join('·')}`).join(', ');
  const autoNoisy=noisyGroups.length?`소음이 큰 작업은 ${noisyTxt} 일정으로 진행됩니다. 해당 기간에는 소음이 다소 클 수 있으며, 최대한 신속히 마무리하겠습니다.`:'';
  const d=Object.assign({
    unit:i.address||'',
    start:i.start||todayStr(), end:i.end||'',
    hours:'평일 09:00 ~ 18:00 (주말·공휴일 작업 없음)',
    works:phases.join(' · ')||'철거 · 설비 · 목공 · 타일 · 도배 · 마루',
    greet:'안녕하세요, 입주민 여러분.\n아래 세대의 실내 인테리어 공사를 진행하게 되어 안내드립니다.\n공사 기간 중 소음과 분진, 자재 운반으로 불편을 드리게 되어 미리 깊은 양해의 말씀을 드립니다.',
    noisy:'철거·타공 등 소음이 큰 작업은 공사 초반 2~3일에 집중되며, 최대한 신속히 마무리하겠습니다.',
    close:'공용 부위(엘리베이터·복도)는 보양재로 보호하고 작업 후 매일 청소하겠습니다.\n정해진 기간 내 공사를 마칠 수 있도록 최선을 다하겠으며, 불편사항은 아래 연락처로 연락 주시면 즉시 조치하겠습니다.',
    manager:i.manager||CO().ceo||'',
    contact:(CO().tel||'').split('/')[0].trim()||i.contact||'',
    logo:CO().logo||'', logoW:140, logoPos:'left', fontScale:100
  },p.notice||{});
  if(autoNoisy)d.noisy=autoNoisy; /* 일정이 바뀌면 소음 안내도 항상 최신 날짜로 */
  return d;
}

      <td class="sub">${esc(v.kakao||'—')}</td>

/* ===== 지출 ===== */
const EXP_KINDS=['자재','인건','외주','경비','기타'];

/* ── 은행 거래내역 가져오기 (신한 쏠·인터넷뱅킹 엑셀/붙여넣기) ── */
const parseAmt=s=>Math.round(Number(String(s==null?'':s).replace(/[^0-9.\-]/g,''))||0);
const bankDate=s=>{const m=/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/.exec(String(s));return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:'';};
const txHash=t=>[t.date,t.amount,t.vendor||'',t.bal==null?'':t.bal].join('|');
/* 붙여넣은 텍스트 → 2차원 배열. 탭이 있으면 TSV(엑셀 복사), 없으면 CSV(따옴표 처리) */
function parseGridText(text){
  const t=String(text||'').replace(/\r\n?/g,'\n');
  if(t.indexOf('\t')>=0)return t.split('\n').map(l=>l.split('\t'));
  const rows=[[]];let cur='',q=false;
  for(let i=0;i<t.length;i++){const ch=t[i];
    if(q){if(ch==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else if(ch==='"')q=true;
    else if(ch===','){rows[rows.length-1].push(cur);cur='';}
    else if(ch==='\n'){rows[rows.length-1].push(cur);cur='';rows.push([]);}
    else cur+=ch;}
  rows[rows.length-1].push(cur);
  return rows;
}
/* 2차원 배열 → 출금 건만 추출. 헤더 행을 키워드로 자동 탐색해 은행별 컬럼 순서 차이를 흡수 */
function parseBankRows(rows){
  const norm=s=>String(s==null?'':s).replace(/[\s()원,]/g,'');
  const KW={date:['거래일자','거래일시','거래일','일자','날짜'],
    out:['출금액','출금','찾으신금액','지급'],
    desc:['적요'],
    vendor:['기재내용','거래내용','내용','받는분','의뢰인/수취인','수취인','거래처','보낸분/받는분'],
    bal:['잔액']};
  const findCol=(cells,kws)=>{for(const w of kws){const i=cells.findIndex(c=>c===w);if(i>=0)return i;}
    for(const w of kws){const i=cells.findIndex(c=>c&&c.indexOf(w)>=0);if(i>=0)return i;}return -1;};
  let hi=-1,col={};
  for(let r=0;r<Math.min(rows.length,15);r++){
    const cells=(rows[r]||[]).map(norm),m={};
    for(const k in KW)m[k]=findCol(cells,KW[k]);
    if(m.date>=0&&m.out>=0){hi=r;col=m;break;}
  }
  if(hi<0)return{err:'거래내역 컬럼(거래일자·출금)을 찾지 못했습니다. 제목 줄까지 포함해서 붙여넣어 주세요.',items:[],skipped:0};
  const items=[];let skipped=0;
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r]||[];if(!row.some(c=>String(c==null?'':c).trim()))continue;
    const date=bankDate(row[col.date]),out=parseAmt(row[col.out]);
    if(!date||out<=0){skipped++;continue;} /* 입금·합계·형식 불명 행 제외 */
    const vend=col.vendor>=0?String(row[col.vendor]==null?'':row[col.vendor]).trim():'';
    const de=col.desc>=0?String(row[col.desc]==null?'':row[col.desc]).trim():'';
    items.push({date,amount:out,vendor:vend||de||'—',desc:vend&&de&&de!==vend?de:'',bal:col.bal>=0?parseAmt(row[col.bal]):null});
  }
  return{items,skipped};
}
/* SheetJS는 파일 업로드 때만 CDN에서 지연 로드 (붙여넣기는 라이브러리 불필요) */

function loadSheetJS(){if(window.XLSX)return Promise.resolve();

    s.onload=res;s.onerror=()=>{_sheetjs=null;rej(new Error('cdn'));};document.head.appendChild(s);});}

    prev.innerHTML=`<div class="card"><div class="tbl-wrap" style="max-height:280px;overflow:auto"><table><thead><tr><th style="width:34px"><input type="checkbox" id="biAll" checked></th><th>날짜</th><th>거래처</th><th>내역</th><th class="r">금액</th></tr></thead>
      <tbody>${items.map((t,i)=>`<tr><td><input type="checkbox" data-bi="${i}" checked></td><td class="num">${esc(t.date)}</td><td class="strong">${esc(t.vendor)}</td><td class="sub">${esc(t.desc||'—')}</td><td class="r num strong">${won(t.amount)}</td></tr>`).join('')}</tbody></table></div></div>`;
    const upd=()=>{const n=items.filter(t=>t.on).length;
      sum.textContent=`출금 ${n}건 선택${dup?` · 중복 제외 ${dup}건`:''}${res.skipped?` · 입금 등 제외 ${res.skipped}건`:''}`;

  ov.querySelector('#biFi').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;

    try{
      if(/\.(csv|txt)$/i.test(f.name)){show(parseBankRows(parseGridText(await f.text())));return;}

function vSettle(c){

  const all=DB.projects.map(pr=>{const con=+pr.info.amount||0;const sp=pr.expenses.reduce((s,e)=>s+(+e.amount||0),0);return {id:pr.id,name:pr.info.name,status:pr.info.status,arch:isArchived(pr),con,sp,pf:con-sp,mg:con?Math.round((con-sp)/con*100):0};});
  all.sort((a,b)=>(a.arch?1:0)-(b.arch?1:0));

    <div class="tbl-wrap"><table><thead><tr><th>현장</th><th>상태</th><th class="r">계약금액</th><th class="r">지출</th><th class="r">이익</th><th class="r">이익률</th></tr></thead>

    </tbody></table></div></div>
  ${(()=>{ /* 회사 전체 손익 — 현장 이익에서 회사 공통 지출까지 뺀 실제 손익 */
    const coArr=DB.coExpenses||[]; const coT=coArr.reduce((s,e)=>s+(+e.amount||0),0);

    DB.projects.forEach(pr=>pr.expenses.forEach(e=>{const m=(e.date||'').slice(0,7);if(!m)return;(months[m]=months[m]||{p:0,c:0}).p+=(+e.amount||0);}));

      <div class="pad" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">
        <div class="kpi"><div class="k">현장 이익 합계</div><div class="v num" style="color:${totP<0?'var(--bad)':'var(--good)'}">${won(totP)}</div></div>

        <div class="kpi tint"><div class="k">최종 손익</div><div class="v num" style="color:${net<0?'var(--bad)':'var(--good)'}">${won(net)}</div></div>

    <div class="kpi"><div class="k">이익률</div><div class="v num" style="color:${margin<0?'var(--bad)':'var(--good)'}">${margin}<small>%</small></div><div class="bar"><i style="width:${Math.max(0,Math.min(100,margin))}%;background:${margin<0?'var(--bad)':'var(--good)'}"></i></div></div>
  </div>
  ${(()=>{ /* 지출을 카드 · 입금(계좌이체) · 노무로 구분 */
    const mSum=m2=>p.expenses.filter(e=>e.method===m2).reduce((s,e)=>s+(+e.amount||0),0);
    const cardT=mSum('카드'),transT=mSum('계좌이체'),etcT=spent-cardT-transT;
    const laborT=(p.workers||[]).reduce((s,w)=>s+(+w.labor||0)+(+w.expense||0),0);
    const grand=spent+laborT;
    const tile=(k,v,s)=>`<div class="kpi"><div class="k">${k}</div><div class="v num">${won(v)}</div><div class="s">${s}</div></div>`;
    return`<div class="card"><div class="card-h"><span class="ct">카드 · 입금 · 노무 구분</span><span class="cs">지출은 결제수단 기준, 노무는 노무비 탭 기록 기준</span></div>

        ${tile('노무',laborT,grand?Math.round(laborT/grand*100)+'%'+' · 노무비+경비':'')}

    ${Object.entries(byKind).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:grid;grid-template-columns:70px 1fr 130px;align-items:center;gap:12px">
      <span class="tag">${esc(k)}</span><div class="bar" style="height:8px;background:var(--line);border-radius:4px;overflow:hidden"><i style="display:block;height:100%;width:${spent?Math.round(v/spent*100):0}%;background:var(--accent);border-radius:4px"></i></div>
      <span class="num" style="text-align:right">${won(v)} <span class="sub">${spent?Math.round(v/spent*100):0}%</span></span></div>`).join('')||'<div class="sub">지출 내역이 없습니다.</div>'}
  </div></div>
  <div class="card"><div class="pad" style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="k" style="font-size:12px;color:var(--muted)">최종 손익</div><div class="num" style="font-size:26px;font-weight:700;color:${profit<0?'var(--bad)':'var(--good)'}">${won(profit)}</div></div>
    <div style="text-align:right" class="sub">계약 ${won(contract)} − 지출 ${won(spent)}<br>이익률 ${margin}%</div></div></div>`;

/* ===== 견적 (estimates) ===== */
const EST_TYPE={item:'아이템 견적서',construction:'시공 견적서'};
function nextEstNo(p){
  const yr=todayStr().slice(0,4);
  const nums=(p.estimates||[]).map(e=>{const m=/EST-\d+-(\d+)/.exec(e.no||'');return m?+m[1]:0;});
  const n=(nums.length?Math.max(...nums):0)+1;
  return`EST-${yr}-${String(n).padStart(3,'0')}`;
}
function newEstItem(){return{id:uid(),name:'',detail:'',spec:'',unit:'',qty:'',mp:'',lp:''};}
function newEstimate(type){
  const p=proj(),i=p.info;
  const est={id:uid(),no:nextEstNo(p),type,date:todayStr(),
    client:i.client||'',clientAddr:i.address||'',sizePy:String(i.area||'').replace(/[^0-9.]/g,''),
    rates:{gongwa:3,profit:10,sanjae:0.96,goyong:0.27},
    target:'',vat:'별도',validDays:30,progress:100,
    remarks:'부가세 별도\n전기 증설 별도\n견적 외 별도',
    sections:type==='construction'
      ?[{id:uid(),name:'공통가설공사',items:[newEstItem()]}]
      :[{id:uid(),name:'품목',items:[newEstItem()]}]};
  p.estimates=p.estimates||[];p.estimates.push(est);save();
  state.estOpen=est.id;render();
}
function estCalc(est){
  const secs=(est.sections||[]).map(s=>({name:s.name,
    total:s.items.reduce((a,it)=>{const q=+it.qty||0;return a+((+it.mp||0)+(+it.lp||0))*q;},0)}));
  const direct=secs.reduce((a,b)=>a+b.total,0);
  let ind=[];
  if(est.type==='construction'){
    const r=est.rates||{};
    ind=[['공과잡비',(+r.gongwa||0)],['기업이윤',(+r.profit||0)],['산재보험',(+r.sanjae||0)],['고용보험',(+r.goyong||0)]]
      .map(x=>[x[0],Math.round(direct*x[1]/100)]);
  }
  const indirect=ind.reduce((a,b)=>a+b[1],0);
  const sub=direct+indirect;
  const target=+est.target||0;
  const discount=(target&&target<sub)?sub-target:0;
  /* 만원 단위 단수정리 — 켜져 있으면 최종 금액에서 만원 미만을 절사 */
  let grand=sub-discount,cut=0;
  if(est.round10k){cut=grand%10000;grand-=cut;}
  return{secs,direct,ind,indirect,sub,discount,cut,grand};
}

    <tbody>${p.estimates.map(e=>{const cal=estCalc(e);

}

function refreshEst(c,est){
  const cal=estCalc(est);
  est.sections.forEach((sec,si)=>{
    const card=c.querySelector(`.est-sec[data-sec="${sec.id}"]`);if(!card)return;
    sec.items.forEach(it=>{
      const q=+it.qty||0,tot=((+it.mp||0)+(+it.lp||0))*q;
      const cell=card.querySelector(`tr[data-eit="${it.id}"] .row-amt`);
      if(cell)cell.textContent=tot?tot.toLocaleString('ko-KR'):'';
    });

}

/* --- 견적서 출력 시트 --- */
const estPageBreak=()=>`<div style="page-break-after:always;height:26px"></div>`;
const ymdKor=d=>{if(!d)return'-';const[y,m,dd]=d.split('-');return`${y}년 ${+m}월 ${+dd}일`;};
/* ── 에디토리얼 공통 조각 — 견적서·발주서·스펙북·안내문이 같은 표지 언어를 쓴다 ── */
const edDateNo=d=>(d||todayStr()).replace(/-/g,' ·');   /* 레퍼런스 표기: 2026 ·07 ·03 */

/* 회사명에서 영문 표기(thinkof_space 등)는 인쇄물에서만 뗀다 — 저장된 회사 정보는 그대로 */
const edBrand=s=>{const t=String(s||'').replace(/\([^)]*[A-Za-z][^)]*\)/g,'').replace(/[A-Za-z_][A-Za-z_.&'-]*/g,'').replace(/\s+/g,' ').trim();return t||String(s||'');};
const edTop=no=>`<div class="ed-top"><div class="ed-co">${esc(edBrand(CO().name))}</div><div class="ed-no">№ ${esc(no)}</div></div>`;

function edFoot(){const co=CO();
  const f=(l,v)=>v?`<span><span class="fl">${l}</span><span class="fv">${esc(v)}</span></span>`:'';

/* ── 견적서 — 1페이지 갑지(공종별 합계 + 간접공사 + 총액), 2페이지부터 공종별 상세내역 ──
   자재/노무 단가는 화면에서 나눠 관리하고, 인쇄물에는 합산 단가 하나로 낸다. */
const edEstSecs=(est,cal)=>{
  const one=(est.sections||[]).length===1&&!(((est.sections[0]||{}).name)||'').trim();
  return(est.sections||[]).map((sec,si)=>({
    num:si+1,
    name:one?'공사 내역':(sec.name||'-'),
    total:cal.secs[si].total,
    items:(sec.items||[]).filter(it=>(it.name||'').trim()||+it.qty||(+it.mp||0)+(+it.lp||0))
  }));
};
/* 전면 표지 — 프로젝트명·날짜·회사 로고. 로고 위치(9분할)와 폭(mm)은 견적서 편집에서 지정 */

    ${edFoot()}

}
function edEstCover(est,cal,hasDetail,forceCmp){
  const i=proj().info;
  const dash='<span class="dash">—</span>';
  const secs=edEstSecs(est,cal);
  let body='';
  /* 갑지는 직접공사·간접공사 두 그룹 — 그룹 머리에 각자의 합계, 맨 아래에서 총금액으로 합쳐진다 */
  const head=(num,name,amt)=>{body+=`<tr class="ed-sec"><td><span class="sn">${String(num).padStart(2,'0')}</span>${esc(name)}</td><td class="n">${amt?numf(amt):dash}</td><td></td></tr>`;};
  const child=(name,amt)=>{body+=`<tr class="ed-sumr"><td>${esc(name)}</td><td class="n">${amt?numf(amt):dash}</td><td class="etc"></td></tr>`;};
  const hasInd=est.type==='construction'&&cal.ind.length;
  if(hasInd){
    head(1,'직접공사',cal.direct);
    secs.forEach(s=>child(s.name,s.total));
    head(2,'간접공사',cal.indirect);
    cal.ind.forEach(x=>child(x[0],x[1]));
  }else{
    secs.forEach(s=>head(s.num,s.name,s.total));
  }
  const rowN=secs.length+(hasInd?2+cal.ind.length:0);
  const cmp=forceCmp||rowN>=12;
  const vatIn=est.vat==='포함';
  const noteLines=[...(est.remarks?String(est.remarks).split('\n').filter(x=>x.trim()):[]),
    `본 견적서는 발행일로부터 ${est.validDays||30}일간 유효하며, 실제 계약 내용에 따라 금액이 달라질 수 있습니다.`,
    ...(hasDetail?['공종별 상세 내역은 다음 페이지에 있습니다.']:[])];
  return`<div class="ed${cmp?' cmp':''}">
    ${edTop(edDateNo(est.date))}
    ${edTitle('Estimate.','견 적 서')}
    <div class="ed-band">
      <div><div class="ed-lab">CLIENT</div><div class="ed-val">${esc(est.client||i.client||'—')} <small>귀하</small></div></div>
      <div><div class="ed-lab">DATE</div><div class="ed-val">${esc(edDot(est.date))}</div></div>
      <div><div class="ed-lab">PROJECT</div><div class="ed-val">${esc(i.name||'')}</div></div>
    </div>
    <div class="ed-amtrow">
      <div><div class="ed-lab">TOTAL AMOUNT</div><div class="ed-amt">₩ <b>${numf(cal.grand)}</b><span class="u">원</span></div></div>
      <div class="ed-vat">VAT ${esc(est.vat||'별도')}</div>
    </div>
    <div class="ed-lab" style="margin:16px 0 2px">SUMMARY</div>
    <table class="edt"><thead><tr><th>구분</th><th style="width:20%">금액</th><th style="width:26%">비고</th></tr></thead>
    <tbody>${body}</tbody></table>
    <div class="ed-tots">
      ${hasInd?`<div class="tr"><span>직접공사</span><b>${numf(cal.direct)}<i>원</i></b></div>
      <div class="tr"><span>간접공사</span><b>${numf(cal.indirect)}<i>원</i></b></div>`
      :`<div class="tr"><span>합계</span><b>${numf(cal.sub)}<i>원</i></b></div>`}
      ${cal.discount?`<div class="tr"><span>할인</span><b>−${numf(cal.discount)}<i>원</i></b></div>`:''}
      ${cal.cut?`<div class="tr"><span>단수정리</span><b>−${numf(cal.cut)}<i>원</i></b></div>`:''}
      <div class="tr"><span>부가세 (${vatIn?'10%':'0%'})</span><b>${vatIn?numf(Math.round(cal.grand*0.1))+'<i>원</i>':'별도'}</b></div>
      <div class="tr grand"><span>총 금 액</span><b>${numf(cal.grand)}<i>원</i></b></div>
    </div>
    <div class="ed-note" style="margin-top:22px"><span class="dash">—</span><div>${noteLines.map(esc).join('<br>')}</div></div>
    ${edFoot()}
  </div>`;

/* 상세내역 — 스펙북과 같은 실측 분할. 한 공종이 페이지에 걸치면 통째로 다음 장으로 민다. */
