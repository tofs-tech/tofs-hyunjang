    /* 세부내역(detail)은 품명 아래 회색 줄, 규격(spec)은 전용 칸으로 */
    const sub=(it.detail||'').trim();
    return`<tr>${cell(`${esc(it.name)}${sub?`<div class="ed-det">${esc(sub)}</div>`:''}`)}${cell(esc(it.spec||''),'etc')}${cell(q?numf(q):'','c')}${cell(esc(it.unit||''),'c')}${cell(u?numf(u):'','n')}${cell(u*q?numf(u*q):'','n')}${cell(esc(it.note||''),'etc')}</tr>`;};
  const secHead=(s,cont)=>`<div class="ed-sech"><span class="sn">${String(s.num).padStart(2,'0')}</span>${esc(s.name)}${cont?' <small>(계속)</small>':''}<small>· 합계 ${numf(s.total)}원</small></div>`;
  /* 화면 밖에 실제 페이지를 그려놓고 scrollHeight로 "더 안 들어갈 때까지" 채운다 (스펙북과 동일) */
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;left:-99999px;top:0;visibility:hidden;pointer-events:none;z-index:-1';
  const outer=document.createElement('div');
  outer.className='pv-page'; outer.style.minHeight='0'; outer.style.boxShadow='none';
  const inner=document.createElement('div'); inner.className='psheet';
  outer.appendChild(inner); stage.appendChild(outer); document.body.appendChild(stage);
  const ruler=document.createElement('div');
  ruler.style.cssText='height:100mm;position:absolute;visibility:hidden';
  stage.appendChild(ruler);
  const pxPerMm=(ruler.getBoundingClientRect().height||377.95)/100;
  ruler.remove();
  const MAXH=250*pxPerMm;            /* 내용 262mm − 하단 회사 푸터 몫 12mm */
  const pages=[];
  let edEl=null,pageEmpty=true;
  const overflow=()=>inner.scrollHeight>MAXH;
  const newPage=()=>{inner.innerHTML=`<div class="ed autoh">${pageHead}</div>`;edEl=inner.firstElementChild;pageEmpty=true;};
  const pushPage=()=>{if(!pageEmpty){edEl.insertAdjacentHTML('beforeend',edFoot());pages.push(inner.innerHTML);}};
  const dropSec=()=>{edEl.lastElementChild.remove();const h=edEl.lastElementChild;if(h&&h.classList.contains('ed-sech'))h.remove();};
  const addWhole=s=>{edEl.insertAdjacentHTML('beforeend',secHead(s,false)+`<table class="edt"><thead>${thRow}</thead><tbody>${s.items.map(rowHtml).join('')}</tbody></table>`);};
  /* 공종이 한 페이지를 통째로 넘길 만큼 길면 행 단위로 나눠 채운다 */
  const fillRows=s=>{
    let idx=0,cont=false;
    while(idx<s.items.length){
      edEl.insertAdjacentHTML('beforeend',secHead(s,cont)+`<table class="edt"><thead>${thRow}</thead><tbody></tbody></table>`);
      const tbody=edEl.lastElementChild.querySelector('tbody');
      let placed=0;
      while(idx<s.items.length){
        tbody.insertAdjacentHTML('beforeend',rowHtml(s.items[idx]));
        /* 빈 페이지에서는 넘치더라도 최소 한 행은 넣는다 — 안 그러면 무한루프 */
        if(overflow()&&!(pageEmpty&&placed===0)){tbody.lastElementChild.remove();break;}
        idx++;placed++;
      }
      if(placed>0)pageEmpty=false; else dropSec();
      if(idx<s.items.length){pushPage();newPage();cont=idx>0;}
    }
  };
  newPage();
  secs.forEach(s=>{
    addWhole(s);
    if(!overflow()){pageEmpty=false;return;}
    dropSec();
    if(!pageEmpty){pushPage();newPage();}   /* 걸치는 공종은 통째로 다음 장으로 */
    addWhole(s);
    if(!overflow()){pageEmpty=false;return;}
    dropSec();
    fillRows(s);                            /* 새 페이지에도 안 들어가는 긴 공종만 분할 */
  });
  pushPage();
  stage.remove();
  return pages;
}
/* 인쇄 폭 기준으로 시트 내용 높이를 실측(mm) — 갑지가 한 장(273mm)에 드는지 확인용 */
function edMeasureMm(html){
  const stage=document.createElement('div');
  stage.style.cssText='position:fixed;left:-99999px;top:0;visibility:hidden;pointer-events:none;z-index:-1';
  const outer=document.createElement('div');outer.className='pv-page';outer.style.minHeight='0';outer.style.boxShadow='none';
  const inner=document.createElement('div');inner.className='psheet';
  outer.appendChild(inner);stage.appendChild(outer);document.body.appendChild(stage);
  const ruler=document.createElement('div');ruler.style.cssText='height:100mm;position:absolute;visibility:hidden';
  stage.appendChild(ruler);
  const pxPerMm=(ruler.getBoundingClientRect().height||377.95)/100;ruler.remove();
  inner.innerHTML=html;
  const mm=inner.scrollHeight/pxPerMm;
  stage.remove();
  return mm;
}
function openEstPreview(est){
  const cal=estCalc(est);
  const detail=edEstDetailPages(est,cal);
  let cover=edEstCover(est,cal,detail.length);
  /* 실측해서 한 장을 넘치면 압축 모드로 다시 — 비고가 길거나 공종이 많아도 갑지는 한 장 */
  if(edMeasureMm(cover)>273)cover=edEstCover(est,cal,detail.length,true);
  const pages=[...(est.coverOn?[edEstFrontCover(est)]:[]),cover,...detail];
  showPreview('견적서',pages,false);
}

/* ===== 스펙북 — 견적서 품목 ↔ 단가·마감재 DB(구분:마감재) 자동 매칭 ===== */
function collectSpecItems(sections,fin,seen,out){
  (sections||[]).forEach(sec=>(sec.items||[]).forEach(it=>{
    const name=(it.name||'').trim();if(!name)return;
    const spec=(it.spec||'').trim();
    const m=fin.find(x=>(x.name||'').trim()===name&&(x.spec||'').trim()===spec)||fin.find(x=>(x.name||'').trim()===name);
    if(!m)return;
    if(seen.has(m.id)){const e=seen.get(m.id);if(sec.name&&!e.locs.includes(sec.name))e.locs.push(sec.name);return;}
    const e={m,locs:sec.name?[sec.name]:[]};seen.set(m.id,e);out.push(e);
  }));
}
function estSpecItems(est){
  migratePrice();
  const fin=DB.priceDB.filter(x=>x.kind==='마감재');
  const seen=new Map(),out=[];
  collectSpecItems(est.sections,fin,seen,out);
  return out;
}
function projSpecItems(p){
  migratePrice();
  const fin=DB.priceDB.filter(x=>x.kind==='마감재');

  return out;
}

  pq.oninput=()=>{state.priceQ=pq.value;clearTimeout(pq.t);pq.t=setTimeout(()=>{const pos=pq.selectionStart;render();const npq=document.getElementById('priceQ');npq.focus();npq.setSelectionRange(pos,pos);},350);};
  c.querySelectorAll('[data-e-type="price"]').forEach(b=>b.onclick=()=>{const it=DB.priceDB.find(x=>x.id===b.dataset.eId);openForm('price',it);});

/* 분류(카테고리) 직접 관리 — 추가·이름변경·삭제 */
function openCatManager(){
  syncPriceCats();
  let cur=PRICE_CATS.map(n=>({old:n,name:n,del:false}));
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="width:min(440px,100%)"><h2>분류 관리</h2>
    <div class="msub">이름을 고치면 기존 항목의 분류도 함께 바뀝니다. 삭제하면 해당 항목은 '미분류'로 남습니다.</div>
    <div style="padding:14px 22px 4px;max-height:48vh;overflow-y:auto" id="cmList"></div>
    <div style="padding:6px 22px 10px;display:flex;gap:6px"><input class="oh" id="cmNew" placeholder="새 분류 이름 (예: 도기·위생)" style="flex:1"><button class="btn sm green" id="cmAdd">${svg(IC.plus)}추가</button></div>
    <div class="modal-foot"><span></span><div class="right"><button class="btn" id="cmCancel">취소</button><button class="btn green" id="cmSave">저장</button></div></div></div>`;
  document.body.appendChild(ov);
  const listEl=ov.querySelector('#cmList');
  const draw=()=>{
    listEl.innerHTML=cur.map((x,i)=>x.del?'':`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input class="oh" data-cm="${i}" value="${esc(x.name)}" style="flex:1">
      <button class="icon-btn" data-cmdel="${i}" title="삭제">${svg(IC.trash)}</button></div>`).join('');
    listEl.querySelectorAll('[data-cm]').forEach(inp=>inp.oninput=()=>{cur[+inp.dataset.cm].name=inp.value;});
    listEl.querySelectorAll('[data-cmdel]').forEach(b=>b.onclick=()=>{cur[+b.dataset.cmdel].del=true;draw();});
  };
  draw();
  ov.querySelector('#cmAdd').onclick=()=>{
    const ni=ov.querySelector('#cmNew'),v=ni.value.trim();if(!v)return;
    if(cur.some(x=>!x.del&&x.name.trim()===v)){toast('이미 있는 분류입니다');return;}
    cur.push({old:null,name:v,del:false});ni.value='';draw();
  };
  const close=()=>ov.remove();
  ov.addEventListener('mousedown',e=>{if(e.target===ov)close();});
  ov.querySelector('#cmCancel').onclick=close;
  ov.querySelector('#cmSave').onclick=()=>{
    const next=[],seen=new Set();
    cur.forEach(x=>{
      const v=(x.name||'').trim();
      if(x.del){if(x.old)DB.priceDB.forEach(it=>{if(it.cat===x.old)it.cat='';});return;}
      if(!v||seen.has(v))return;seen.add(v);next.push(v);
      if(x.old&&x.old!==v)DB.priceDB.forEach(it=>{if(it.cat===x.old)it.cat=v;});
    });
    DB.priceCats=next;syncPriceCats();
    if(state.priceCat&&state.priceCat!=='전체'&&!next.includes(state.priceCat))state.priceCat='전체';
    save();close();render();toast('분류가 저장되었습니다');
  };
}
/* 견적·발주 품목 → 단가 DB 역저장 (같은 품명+규격이 있으면 가격·단위만 갱신) */
function guessKind(it){return(+it.lp>0&&!(+it.mp>0))?'시공단가':'시공자재';}
function upsertPriceDB(e){
  migratePrice();
  const name=(e.name||'').trim();if(!name)return null;
  const spec=(e.spec||'').trim(), brand=(e.brand||'').trim();
  /* 품명+규격이 같으면 같은 자재로 본다. 단 브랜드가 양쪽 다 있고 서로 다르면
     별개 자재다 — 같은 모델명이라도 대림과 에떼르노는 다른 물건이다.
     (견적서·발주서는 브랜드를 안 넘기므로 기존 동작 그대로 매칭된다) */
  const ex=DB.priceDB.find(x=>(x.name||'').trim()===name&&(x.spec||'').trim()===spec
    &&(!brand||!(x.brand||'').trim()||(x.brand||'').trim()===brand));
  if(ex){
    let ch=false;
    if(e.unit&&ex.unit!==e.unit){ex.unit=e.unit;ch=true;}
    if(e.mp!==''&&e.mp!=null&&+e.mp!==+(ex.mp||0)){ex.mp=e.mp;ch=true;}
    if(e.lp!==''&&e.lp!=null&&+e.lp!==+(ex.lp||0)){ex.lp=e.lp;ch=true;}
    if(e.cat&&!ex.cat){ex.cat=e.cat;ch=true;}
    /* 빈 칸만 채운다 — DB에 정리해둔 값을 현장 데이터로 덮어쓰지 않는다 */
    ['brand','img','note','vendor','detail'].forEach(k=>{if(e[k]&&!ex[k]){ex[k]=e[k];ch=true;}});
    /* 마감재는 명시 지정이라 guessKind 추측보다 우선한다 */
    if(e.kind==='마감재'&&ex.kind!=='마감재'){ex.kind='마감재';ch=true;}
    return ch?'updated':'same';
  }
  DB.priceDB.push({id:uid(),kind:e.kind||guessKind(e),cat:e.cat||'',name,spec,unit:e.unit||'',mp:e.mp||'',lp:e.lp||'',brand,vendor:e.vendor||'',note:e.note||'',detail:e.detail||'',img:e.img||''});
  return 'added';
}
/* 현장 마감재 → 자재DB. 그룹명이 분류가 된다.
   수량·상태·공정은 현장마다 다른 값이라 DB로 넘기지 않는다. */
function saveMaterialsToPriceDB(items){
  const list=(items||[]).filter(m=>(m.name||'').trim());
  if(!list.length){toast('저장할 마감재가 없습니다');return;}
  let a=0,u=0;
  list.forEach(m=>{
    const r=upsertPriceDB({kind:'마감재',cat:m.group||'',name:m.name,spec:m.spec,unit:m.unit,
      mp:m.price,lp:'',brand:m.brand,img:m.img,note:m.note,detail:m.detail});
    if(r==='added')a++;else if(r==='updated')u++;
  });
  if(!a&&!u){toast('자재DB에 이미 모두 등록되어 있습니다');return;}
  save();
  toast('자재DB 저장: '+[a?`신규 ${a}개`:'',u?`갱신 ${u}개`:''].filter(Boolean).join(' · '));
}
/* 자재DB → 현장 마감재. 분류가 그룹이 되고, 수량은 현장에서 채운다. */
function importMaterialsFromDB(){
  const p=proj();
  openPricePicker(it=>{
    p.materials.push({id:uid(),group:it.cat||'미분류',phase:'',name:it.name||'',brand:it.brand||'',
      spec:it.spec||'',unit:it.unit||'',qty:'',price:it.mp||'',status:'미정',img:it.img||'',note:it.note||'',detail:it.detail||''});
    save();
  },{kind:'마감재'});
}
function saveItemsToPriceDB(items,cat){
  let a=0,u=0;
  (items||[]).forEach(it=>{const r=upsertPriceDB({cat,name:it.name,spec:it.spec,unit:it.unit,mp:it.mp,lp:it.lp});if(r==='added')a++;else if(r==='updated')u++;});
  if(!a&&!u){toast('단가 DB에 이미 모두 등록되어 있습니다');return;}
  save();
  toast('단가 DB 저장: '+[a?`신규 ${a}개`:'',u?`가격 갱신 ${u}개`:''].filter(Boolean).join(' · '));
}

/* ===== 계약서 (contracts) ===== */
/* 금액 → 한글 (예: 101200000 → 일억백이십만) */
function wonHangul(n){
  n=Math.floor(+n||0); if(!n)return'영';
  const d=['','일','이','삼','사','오','육','칠','팔','구'], su=['','십','백','천'], gu=['','만','억','조'];
  let out='',gi=0;
  while(n>0){
    const g=n%10000;
    if(g){
      let s=''; String(g).split('').reverse().forEach((ch,i)=>{const v=+ch;if(!v)return;s=((v===1&&i>0)?'':d[v])+su[i]+s;});
      out=s+gu[gi]+out;
    }
    n=Math.floor(n/10000); gi++;
  }
  return out;
}

{t:'제 6 조 【공사의 변경, 중지】',b:['1. "갑"은 필요하다고 인정하거나 공사내용의 변경, 추가 또는 공사의 전부나 일부에 대한 시공을 일시적으로 중지할 경우에는 변경계약서 등 서면을 사전 "을"에게 교부해야 한다.']},
{t:'제 7 조 【준공검사】',b:['1. "을"은 공사를 완성한 때에는 "갑"에게 통지하여야 하며 "갑"은 통지를 받은 날로부터 3일 이내에 "을"을 동행하여 공사목적물에 대하여 검사하여야 한다. 만일, "갑"이 "을"의 통지를 받은 후 5일 이내에 검수 결과를 통지하지 아니한 경우에는 5일이 경과한 날에 검수에 합격한 것으로 간주한다. 다만, 천재지변 등 불가항력적인 사유로 인하여 검사를 완료하지 못한 경우에는 당해 사유가 존속되는 기간과 당해 사유가 소멸된 날로부터 3일까지는 이를 연장할 수 있다.','2. "을"은 제1항의 검사에 합격하지 못한 때에는 이를 보수 또는 개조하여 다시 검사를 받아야한다.','3. "을"은 검사의 결과에 이의가 있을 때에는 재검사를 요구할 수 있으며, "갑"은 이에 응하여야 한다.','4. "갑"은 제1항의 규정에 의한 검사 합격 후 "을"이 공사목적물의 인수를 요청하면 즉시 현장인수증명서를 발급하고 공사목적물을 인수하여야 한다.']},
{t:'제 8 조 【설계변경으로 인한 계약금액의 조정】',b:['1. "갑"의 책임 있는 귀책사유로 인해 시공에 관하여 예기하지 못한 사태가 발생되거나 사업계획의 변경 등으로 인하여 추가 시설물의 설치가 필요한 때에는 설계를 변경하여야 한다.','2. 제1항의 설계변경으로 인하여 공사량의 증감이 발생한 때에는 "갑"과 "을"이 서로 협의하여 계약금액을 조정하며, 필요한 경우 공사기간을 연장하거나 단축할 수 있다. 이때 증감된 공사의 단가는 "을"이 제시한 산출내역서를 기준으로 하되 증감된 공사에 대한 일반관리비 및 이윤 등은 상호 협의하여 결정한다.']},
{t:'제 9 조 【하자보증】',b:['1. "을"은 "갑"이 공사목적물을 인수한 날과 준공검사를 마친 날 중에서 먼저 도래한 날로부터 계약서에 정한 하자보증기간 중 당해 공사에 발생하는 일체의 하자를 "을"의 부담으로 보수하여야 한다.','2. 공사부위가 소모품(전구, 수전 기타등등) 설치 및 부품일 경우 "을"은 책임을 면한다.','3. 사용자의 부주의 및 사용상의 하자(유리 및 집기의 손상 포함)가 발생할 시에는 "을"은 책임을 면한다.']},
{t:'제 10 조 【갑의 계약해제 등】',b:['1. "을"은 다음 각호에 해당하는 경우에는 계약의 전부 또는 일부를 해제 또는 해지할 수 있다.','&nbsp;&nbsp;① "을"이 정당한 이유없이 약정한 착공기일을 경과하고도 공사에 착수하지 아니한 경우','&nbsp;&nbsp;② "을"의 책임 있는 사유로 인하여 준공기일 내에 공사를 완성할 가능성이 없음이 명백한 경우','&nbsp;&nbsp;③ "을"이 관할 행정청으로부터 면허 또는 등록의 취소, 업무정지 등의 처분을 받은 경우','2. 천재지변 등의 부득이 한 사유로 계약이행이 곤란하게 된 경우에는 상대방과 협의하여 계약을 해제 해지할 수 있다.','3. 제1항의 규정에 의한 통지를 받은 때에는 다음의 사항을 준수하여야 한다.','&nbsp;&nbsp;① 해약통지서를 받은 부분에 대한 공사를 지체없이 중지하고 모든 공사관련 시설 및 장비등을 공사현장으로부터 철거한다.','&nbsp;&nbsp;② "갑"의 대여품이 있을 때에는 지체없이 "갑"에게 반환한다. 이 경우 당해 대여품이 "을"의 고의 또는 과실로 인하여 멸실 또는 파손되었을 때에는 원상회복 또는 그 손해액을 배상한다.']},
{t:'제 11 조 【을의 계약해제 등】',b:['1. "을"은 다음 각호에 해당하는 경우에는 계약의 전부 또는 일부를 해제 또는 해지할 수 있다.','&nbsp;&nbsp;① 공사내용을 변경함으로써 계약금액이 100분의 30 이상 감소된 때','&nbsp;&nbsp;② "갑"의 책임 있는 사유에 의한 공사의 정지기간이 계약서상의 공사기간의 100분의 30을 초과한 때','&nbsp;&nbsp;③ "갑"이 정당한 이유없이 계약내용(대금지급포함)을 이행하지 아니함으로써 공사의 적정이행이 불가능 하다고 인정되는 때','2. 제1항의 규정에 의한 계약의 해제 또는 해지는 "을"이 "갑"에게 서면으로 계약이행기간을 정하여 통보한 후 제시한 기간내에 이행되지 아니한 때 효력이 발생한다.']},
{t:'제 12 조 【계약해지시의 처리】',b:['1. 제10조 및 제11조의 규정에 의한 계약의 해제 또는 해지로 인하여 손해가 발생한때에는 상대방에게 그에 대한 배상을 청구할 수 있다.']},
{t:'제 13 조 【계약의 양도 및 변경 등】',b:['1. "갑"과 "을"은 상대방의 승낙 없이는 이 계약상의 권리·의무를 제3자에게 양도, 대여, 담보제공 등 기타 처분행위를 할 수 없다.','2. "갑"의 계획변경, 관계법규의 개·폐, 천재지변 등 불가항력적인 사유의 발생으로 설계업무를 수정하거나 계약기간을 연장할 상당한 이유가 있는 때에는 "갑"과 "을"은 서로 협의하여 계약의 내용을 변경할 수 있다.','3. "을"은 공사목적물 또는 공사현장에 반입하여 검사를 필 한 공사자재에 대하여 제3자에게 매각, 양도 또는 대여하거나 담보목적으로 제공할 수 없다.']},
{t:'제 14 조 【분쟁의 해결】',b:['1. 계약에 별도로 규정된 것을 제외하고는 계약에서 발생하는 문제에 관한 분쟁은 계약 당사자가 쌍방의 합의에 의하여 해결한다.','2. 제1항의 합의가 성립되지 못할 때에는 당사자는 건설산업 기본법에 의하여 설치된 분쟁 조정위원회의 조정 또는 중재법에 의한 중재기관의 중재를 신청할 수 있다.']},
{t:'제 15 조 【기밀유지】',b:['1. 기타 이 계약에서 정하지 아니한 사항에 대하여는 "갑"과 "을"이 합의하여 별도의 특약을 정할 수 있다.']},
{t:'제 16 조 【지체상금】',b:['① "을"은 준공일 내에 공사를 완성하지 아니한 때에는 매 지체일수마다 계약서상의 지체상금율을 계약금액에 곱하여 산출한 금액(이하 \'지체상금\'이라 한다)을 "갑"에게 납부하여야 한다. 다만, "갑"의 귀책사유로 준공검사가 지체된 경우와 다음 각호의 1에 해당하는 사유로 공사가 지체된 경우에는 그 해당일수에 상당하는 지체상금을 지급하지 아니하여도 된다.','&nbsp;&nbsp;1. 제16조에서 규정한 불가항력의 사유에 의한 경우','&nbsp;&nbsp;2. "을"이 대체하여 사용할 수 없는 중요한 자재의 공급이 "갑"의 책임있는 사유로 인해 지연되어 공사진행이 불가능하게 된 경우','&nbsp;&nbsp;3. "갑"의 귀책사유로 착공이 지연되거나 시공이 중단된 경우','&nbsp;&nbsp;4. 기타 "을"의 책임에 속하지 아니하는 사유로 공사가 지체된 경우','② "갑"은 전항의 규정에 의하여 산출된 지체상금은 "을"에게 지급되는 공사대금과 상계할 수 있다.']},
];
function newContract(){
  const p=proj(),i=p.info;
  const nm=i.name||'';
  const ctr={id:uid(),date:todayStr(),
    siteName:nm+(/인테리어|공사/.test(nm)?' 공사':' 인테리어 공사'),siteAddr:i.address||'',
    start:i.start||'',end:i.end||'',amount:i.amount||'',
    payments:[
      {id:uid(),label:'계약금',pct:'50',note:'계약 당일 지급'},
      {id:uid(),label:'중도금',pct:'25',note:'공정 50% 시점 지급'},
      {id:uid(),label:'잔금',pct:'25',note:'준공 후 10일 이내 지급'}],
    defectRate:'100분의 10',defectMonths:'12',delayRate:'1/1000',
    bank:CO().bank||'',etc:'',
    clientCo:i.client||'',clientAddr:'',clientCeo:''};
  p.contracts=p.contracts||[];p.contracts.push(ctr);save();
  state.ctrOpen=ctr.id;render();
}
function vContract(c){
  const p=proj();p.contracts=p.contracts||[];
  const open=p.contracts.find(x=>x.id===state.ctrOpen);
  if(open)return ctrEditor(c,p,open);
  state.ctrOpen=null;
  c.innerHTML=`
  <div class="vhead"><div><div class="t">공사 계약서</div><div class="d">인테리어 표준계약서 — 표지·계약내용·서명란·계약조건(제1~16조)이 자동 구성됩니다.</div></div><div class="spacer"></div>
    <button class="btn sm" data-company>회사 정보</button>
    <button class="btn green" id="newCtr">${svg(IC.plus)}새 계약서</button></div>
  ${p.contracts.length?`<div class="card"><div class="tbl-wrap"><table><thead><tr><th>공사명</th><th>계약일</th><th>도급인(갑)</th><th class="r">계약금액</th><th></th></tr></thead>
    <tbody>${p.contracts.map(x=>`<tr style="cursor:pointer" data-open-ctr="${x.id}"><td class="strong">${esc(x.siteName)}</td><td class="num">${fdateF(x.date)}</td><td>${esc(x.clientCo||'—')}</td><td class="r num strong">${won(x.amount)}</td>
      <td><div class="row-actions no-print"><button class="icon-btn" data-del-ctr="${x.id}" title="삭제">${svg(IC.trash)}</button></div></td></tr>`).join('')}</tbody></table></div></div>`
   :`<div class="card">${emptyB('아직 만든 계약서가 없습니다. "새 계약서"로 시작하세요.','')}</div>`}`;
  document.getElementById('newCtr').onclick=newContract;
  c.querySelector('[data-company]').onclick=()=>openForm('company',DB.company);
  c.querySelectorAll('[data-open-ctr]').forEach(r=>r.onclick=e=>{if(e.target.closest('[data-del-ctr]'))return;state.ctrOpen=r.dataset.openCtr;render();});
  c.querySelectorAll('[data-del-ctr]').forEach(b=>b.onclick=()=>{if(!confirm('이 계약서를 삭제할까요?'))return;p.contracts=p.contracts.filter(x=>x.id!==b.dataset.delCtr);save();render();});
}
function ctrField(k,label,type,val,full){return`<div class="field ${full?'full':''}"><label>${label}</label><input data-ctrf="${k}" type="${type}" value="${esc(val==null?'':val)}" ${type==='number'?'step="any"':''}></div>`;}
function ctrEditor(c,p,ctr){
  c.innerHTML=`
  <div class="vhead">
    <button class="btn sm" id="ctrBack">← 목록</button>
    <div><div class="t">공사 계약서</div><div class="d">비워둔 칸은 현장 정보에서 자동으로 채워집니다</div></div>
    <div class="spacer"></div>
    <button class="btn sm" id="ctrReload">현장 정보 다시 불러오기</button>
    <button class="btn sm" data-company>회사 정보</button>
    <button class="btn" id="ctrWord">워드(.doc)</button>
    <button class="btn accent" id="ctrPreview">${svg(IC.print)}미리보기 · 보내기</button>
  </div>
  <div class="card"><div class="card-h"><span class="ct">계약 내용</span></div>
    <div class="pad" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
    ${ctrField('siteName','공사명','text',ctr.siteName,1)}
    ${ctrField('siteAddr','공사장소','text',ctr.siteAddr,1)}
    ${ctrField('date','계약일','date',ctr.date)}
    ${ctrField('start','착공일','date',ctr.start)}
    ${ctrField('end','준공예정일','date',ctr.end)}
    ${ctrField('amount','계약총금액 (부가세별도)','number',ctr.amount)}
    ${ctrField('defectRate','하자보수 보증금율','text',ctr.defectRate)}
    ${ctrField('defectMonths','하자담보 책임기간(개월)','text',ctr.defectMonths)}
    ${ctrField('delayRate','지체상금율','text',ctr.delayRate)}
    ${ctrField('bank','입금계좌','text',ctr.bank,1)}
    ${ctrField('etc','기타사항','text',ctr.etc,1)}
  </div></div>
  <div class="card" style="margin-top:16px"><div class="card-h"><span class="ct">대금 지급 조건</span><span class="cs">비율(%)과 조건을 수정하세요</span></div>
    <div class="tbl-wrap"><table class="ordtable"><thead><tr><th style="width:120px">구분</th><th style="width:90px" class="r">비율 %</th><th class="r" style="width:130px">금액(자동)</th><th>지급 조건</th></tr></thead>
    <tbody>${ctr.payments.map(pm=>`<tr data-pay="${pm.id}">
      <td><input class="ci" data-pf="label" value="${esc(pm.label)}"></td>
      <td><input class="ci r num" data-pf="pct" type="number" step="any" value="${esc(pm.pct)}"></td>
      <td class="r num sub pay-amt"></td>
      <td><input class="ci" data-pf="note" value="${esc(pm.note)}"></td></tr>`).join('')}</tbody></table></div></div>
  <div class="card" style="margin-top:16px"><div class="card-h"><span class="ct">도급인 (갑 — 고객)</span><span class="cs">비워두면 출력물에 빈칸(수기 작성)으로 나옵니다</span></div>
    <div class="pad" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
    ${ctrField('clientCo','상호 (또는 성명)','text',ctr.clientCo)}
    ${ctrField('clientAddr','주소','text',ctr.clientAddr,1)}
    ${ctrField('clientCeo','대표 (성명)','text',ctr.clientCeo)}
  </div></div>`;
  document.getElementById('ctrBack').onclick=()=>{state.ctrOpen=null;render();};
  c.querySelector('[data-company]').onclick=()=>openForm('company',DB.company);
  document.getElementById('ctrPreview').onclick=()=>openCtrPreview(ctr);
  document.getElementById('ctrWord').onclick=()=>exportCtrWord(ctr);
  document.getElementById('ctrReload').onclick=()=>{
    if(!confirm('공사명·주소·기간·금액·고객명을 현장 정보로 다시 채울까요?'))return;
    const i=p.info,nm=i.name||'';
    ctr.siteName=nm+(/인테리어|공사/.test(nm)?' 공사':' 인테리어 공사');
    ctr.siteAddr=i.address||'';ctr.start=i.start||'';ctr.end=i.end||'';
    ctr.amount=i.amount||'';ctr.clientCo=i.client||'';
    save();render();toast('현장 정보를 불러왔습니다');
  };
  const payRefresh=()=>{c.querySelectorAll('tr[data-pay]').forEach(tr=>{
    const pm=ctr.payments.find(x=>x.id===tr.dataset.pay);
    const amt=Math.round((+ctr.amount||0)*(+pm.pct||0)/100);
    tr.querySelector('.pay-amt').textContent=amt?won(amt):'';});};
  c.querySelectorAll('[data-ctrf]').forEach(inp=>inp.onchange=()=>{ctr[inp.dataset.ctrf]=inp.value;save();payRefresh();});
  c.querySelectorAll('tr[data-pay]').forEach(tr=>{
    const pm=ctr.payments.find(x=>x.id===tr.dataset.pay);if(!pm)return;
    tr.querySelectorAll('.ci').forEach(inp=>inp.addEventListener('input',()=>{pm[inp.dataset.pf]=inp.value;save();payRefresh();}));
  });
  payRefresh();
}
/* --- 계약서 출력 --- */
function ctrCoverHtml(ctr){
  return`<div class="ctrcov">
    <div class="ctrcov-line"></div>
    <div class="ctrcov-h1">인테리어 표준계약서</div>
    <div class="ctrcov-sub">${esc(ctr.siteName||'')}</div>
    <div class="ctrcov-addr">_${esc(ctr.siteAddr||'')}</div>
  </div>`;
}
function ctrMainHtml(ctr){
  const co=CO();
  const amt=+ctr.amount||0;
  const payRows=ctr.payments.filter(pm=>pm.label).map((pm,idx)=>
    `<tr><td class="k"></td><td class="v sub2">${idx+1}) ${esc(pm.label)} : ${esc(pm.pct)} % ${pm.note?'('+esc(pm.note)+')':''} — ${won(Math.round(amt*(+pm.pct||0)/100))}</td></tr>`).join('');
  return`<div class="ctrmain">
    <div class="ctrcov-line"></div>
    <div class="ctr-h1">인테리어 공사계약서</div>
    <div class="ctr-logo">${coLogo(86)}<div>THINKOF_SPACE</div></div>

/* 도급조건은 분량이 A4 한 장을 넘으므로 조항 단위로 여러 페이지에 나눠 담는다 */
function ctrTermsPages(){
  const lines=a=>1.6+a.b.reduce((s,x)=>s+Math.ceil(String(x).replace(/&nbsp;/g,' ').replace(/<[^>]*>/g,'').length/54),0);
  const MAX=50; /* A4(psheet) 한 장에 들어가는 대략의 줄 수 */
  const chunks=[];let cur=[],used=4; /* 첫 장은 제목만큼 여유를 뺌 */
  CTR_TERMS.forEach(a=>{const L=lines(a);
    if(used+L>MAX&&cur.length){chunks.push(cur);cur=[];used=0;}
    cur.push(a);used+=L;});
  if(cur.length)chunks.push(cur);
  return chunks.map((arts,pi)=>`<div class="ctrterms">
    ${pi===0?'<div class="ctrterms-h1">도급 계약조건</div>':''}
    ${arts.map(a=>`<div class="ctr-art"><div class="at">${esc(a.t)}</div>${a.b.map(x=>`<div class="ab">${x}</div>`).join('')}</div>`).join('')}
    <div style="text-align:center;color:#aaa;font-size:9px;margin-top:18px">— 도급 계약조건 ${pi+1} / ${chunks.length} —</div>
  </div>`);
}

function ctrEff(ctr){
  const i=proj().info;
  const eff=Object.assign({},ctr);
  if(!eff.siteAddr)eff.siteAddr=i.address||'';
  if(!eff.start)eff.start=i.start||'';
  if(!eff.end)eff.end=i.end||'';
  if(!+eff.amount)eff.amount=i.amount||'';
  if(!eff.clientCo)eff.clientCo=i.client||'';
  if(!eff.bank)eff.bank=CO().bank||'';
  return eff;
}
function openCtrPreview(ctr){
  const e=ctrEff(ctr);
  showPreview('공사계약서',[ctrCoverHtml(e),ctrMainHtml(e),ctrSignHtml(e),...ctrTermsPages()],false);
}
/* 계약서 → 워드(.doc): 페이지를 페이지 나눔으로 이어붙이고, 워드가 못 읽는 SVG(로고·도장)는 제외 */
function exportCtrWord(ctr){
  const e=ctrEff(ctr);
  const html=[ctrCoverHtml(e),ctrMainHtml(e),ctrSignHtml(e),...ctrTermsPages()]
    .map((pg,i)=>`<div${i?' style="page-break-before:always"':''}>${pg}</div>`).join('')
    .replace(/<svg[\s\S]*?<\/svg>/g,'');
  downloadWordDoc(`공사계약서_${safeName(proj().info.name||'현장')}_${todayStr()}.doc`,html);
}

  overlayEl.innerHTML=`<div class="modal" role="dialog" aria-modal="true"><h2>${editing?'수정':'추가'} · ${cfg.title}</h2><div class="msub">${cfg.sub}</div>
    <form class="form" id="entForm">${fh}</form>
    <div class="modal-foot">${editing&&type!=='info'&&type!=='company'?`<button type="button" class="btn ghost" id="delBtn" style="color:var(--bad)">${svg(IC.trash)}삭제</button>`:type==='info'?`<button type="button" class="btn ghost" id="delProjBtn" style="color:var(--bad)">${svg(IC.trash)}프로젝트 삭제</button>`:'<span></span>'}
    <div class="right"><button type="button" class="btn" id="cancelBtn">취소</button><button type="submit" class="btn green" form="entForm">${editing?'저장':'추가'}</button></div></div></div>`;
  document.body.appendChild(overlayEl);
  const close=()=>{overlayEl.remove();overlayEl=null;};
  overlayEl.addEventListener('mousedown',e=>{if(e.target===overlayEl)close();});
  document.addEventListener('keydown',function k(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',k);}});
  overlayEl.querySelector('#cancelBtn').onclick=close;
  /* 이미지 필드 처리 — fix 필드(마감재·자재 사진)는 항상 동일 규격(720×540)으로 크롭 */
  const setFieldImg=async(k,file,fix)=>{
    const du=await(fix?normSpecImage(file):compressImage(file,file.type==='image/png'?900:640));
    if(!du){alert('이미지를 읽지 못했습니다.');return false;}
    overlayEl.querySelector(`input[name="${k}"]`).value=du;
    const pv=overlayEl.querySelector(`[data-imgprev="${k}"]`);pv.src=du;pv.style.display='';
    overlayEl.querySelector(`[data-imgclear="${k}"]`).style.display='';
    return true;
  };
  overlayEl.querySelectorAll('[data-imgpick]').forEach(fi=>fi.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    await setFieldImg(fi.dataset.imgpick,f,!!fi.dataset.imgfix);
  });
  /* 캡쳐 붙여넣기 — 홈페이지에서 이미지 복사 후 버튼 클릭(또는 Ctrl+V) */
  overlayEl.querySelectorAll('[data-imgpaste]').forEach(b=>b.onclick=async()=>{
    const k=b.dataset.imgpaste,fix=!!b.dataset.imgfix;
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){
        const t=it.types.find(x=>x.startsWith('image/'));
        if(t){const blob=await it.getType(t);if(await setFieldImg(k,blob,fix))toast('캡쳐 이미지가 등록되었습니다');return;}
      }
      toast('클립보드에 이미지가 없습니다 — 홈페이지에서 이미지를 복사한 뒤 다시 눌러주세요');
    }catch(e){toast('클립보드 접근이 막혀 있습니다 — 이 창에서 Ctrl+V를 눌러보세요');}
  });
  overlayEl.addEventListener('paste',e=>{
    const f=[...((e.clipboardData||{}).files||[])].find(x=>x.type.startsWith('image/'));
    if(!f)return;
    const pb=overlayEl.querySelector('[data-imgpaste]');if(!pb)return;
    e.preventDefault();
    setFieldImg(pb.dataset.imgpaste,f,!!pb.dataset.imgfix).then(ok=>{if(ok)toast('캡쳐 이미지가 등록되었습니다');});
  });
  overlayEl.querySelectorAll('[data-imgclear]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.imgclear;
    overlayEl.querySelector(`input[name="${k}"]`).value='';
    overlayEl.querySelector(`[data-imgprev="${k}"]`).style.display='none';
    b.style.display='none';
  });
  /* 다중 사진 필드 (현장일지 등) */
  overlayEl.querySelectorAll('[data-imgs]').forEach(wrap=>{
    const hid=wrap.querySelector('input[type=hidden]'),grid=wrap.querySelector('.imgs-grid');
    const get=()=>{try{return JSON.parse(hid.value||'[]');}catch(e){return[];}};
    const setv=a=>{hid.value=JSON.stringify(a);draw();};
    const draw=()=>{grid.innerHTML=get().map((du,i)=>`<div style="position:relative"><img src="${du}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;display:block;border:1px solid var(--line)">
      <button type="button" data-imgdel="${i}" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:var(--bad);color:#fff;font-size:12px;cursor:pointer;line-height:1">×</button></div>`).join('');
      grid.querySelectorAll('[data-imgdel]').forEach(b=>b.onclick=()=>{const a=get();a.splice(+b.dataset.imgdel,1);setv(a);});};
    draw();
    wrap.querySelector('[data-imgsadd]').onchange=async e=>{
      const fs=[...e.target.files];if(!fs.length)return;
      const a=get();
      for(const f of fs){const du=await compressImage(f);if(du)a.push(du);}
      setv(a);e.target.value='';
    };
  });
  const del=overlayEl.querySelector('#delBtn');
  if(del)del.onclick=()=>{if(confirm('삭제할까요?')){
    if(DB_FORM_TARGET[type])DB[DB_FORM_TARGET[type]]=DB[DB_FORM_TARGET[type]].filter(x=>x.id!==existing.id);
    else{const p=proj();p[type]=p[type].filter(x=>x.id!==existing.id);}
    save();close();render();}};
  const delP=overlayEl.querySelector('#delProjBtn');
  if(delP)delP.onclick=()=>{
    if(DB.projects.length<=1){alert('마지막 남은 프로젝트는 삭제할 수 없습니다.');return;}
    const cur=proj();
    if(!confirm(`'${cur.info.name}' 프로젝트를 삭제할까요?\n일정·지출·사진 등 모든 데이터가 함께 삭제되며 되돌릴 수 없습니다.`))return;
    if(!confirm('정말 삭제합니다. 계속할까요?'))return;
    DB.projects=DB.projects.filter(x=>x.id!==cur.id);
    DB.active=DB.projects[0].id;
    save();close();render();toast('프로젝트가 삭제되었습니다');
  };
  overlayEl.querySelector('#entForm').onsubmit=e=>{e.preventDefault();
    const fd=new FormData(e.target),obj={};
    cfg.fields.forEach(f=>{let v=fd.get(f.k);if(f.t==='number')v=v===''?'':Number(v);if(f.t==='images'){try{v=JSON.parse(v||'[]');}catch(err){v=[];}}obj[f.k]=v;});
    for(const f of cfg.fields)if(f.req&&(obj[f.k]===''||obj[f.k]==null)){alert(`'${f.l}' 항목을 입력해 주세요.`);return;}
    cfg.fields.forEach(f=>{if(f.dl==='trades'&&obj[f.k])addTrade(obj[f.k]);});
    if(type==='info')Object.assign(proj().info,obj);
    else if(DB_FORM_TARGET[type]&&!editing){obj.id=uid();(DB[DB_FORM_TARGET[type]]=DB[DB_FORM_TARGET[type]]||[]).push(obj);}
    else if(editing)Object.assign(existing,obj);
    else{const p=proj();obj.id=uid();(p[type]=p[type]||[]).push(obj);}
    if(type==='workers')upsertWorkerDB(editing?existing:obj); /* 현장 출력 기록 → 작업자 명부 자동 반영 */
    save();close();render();
  };
  if(!IS_TOUCH)setTimeout(()=>{const el=overlayEl?.querySelector('input,select,textarea');el&&el.focus();},30);
}

/* ===== new project ===== */
function newProject(){const id=uid();
  DB.projects.push({id,info:{name:'새 프로젝트',client:'',contact:'',address:'',area:'',siteInfo:'',manager:'',entryNo:'',amount:0,vat:'별도',start:'',end:'',status:'진행중',statusMemo:'',memo:''},todos:[],schedule:[],payments:[],materials:[],orders:[],logs:[],photos:[],expenses:[],workers:[],as:[],files:[]});
  DB.active=id;state.tab='schedule';save();render();openForm('info',proj().info);}

/* ===== 저장 · 백업 =====
   자동 저장(1.2초 지연)은 그대로 두고, 즉시 올리는 수단과
   파일 백업을 따로 둔다. 클라우드는 행 하나를 덮어쓰는 구조라
   이력이 없다 — 파일 백업이 유일한 되돌리기 수단이다. */
async function saveNow(){
  const b=document.getElementById('saveNowBtn');
  save();                                   /* 로컬 캐시 + 동기화 예약 */
  if(!session){toast('로그인 상태가 아닙니다 — 이 기기에만 저장했습니다');return;}
  if(syncBusy){toast('저장 중입니다…');return;}
  const orig='저장';
  if(b){b.disabled=true;b.textContent='저장 중…';}
  clearTimeout(syncT);syncBusy=true;syncDirty=false;
  try{
    await sbUpsert();
    lastSyncedAt=new Date().toISOString();setSync('ok','저장됨');
    if(b)b.textContent='✓ 저장됨';
    toast('클라우드에 저장했습니다');
  }catch(e){
    setSync('bad','저장 실패');
    if(b)b.textContent='저장 실패';
    toast('저장 실패 — 인터넷 연결을 확인해 주세요');
    syncDirty=true;queueSync();             /* 자동 재시도로 넘긴다 */
  }finally{
    syncBusy=false;
    if(b)setTimeout(()=>{b.disabled=false;b.textContent=orig;},1600);
  }
}
function bkStamp(){const d=new Date(),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;}
function exportBackup(silent){
  try{
    const blob=new Blob([JSON.stringify(DB)],{type:'application/json'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`tofs-백업-${bkStamp()}.json`;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    if(!silent)toast('백업 파일을 내려받았습니다');
    return true;
  }catch(e){toast('백업 파일 만들기에 실패했습니다');return false;}
}
/* 백업 파일인지 확인하고 요약을 낸다. 아니면 null. */
function backupSummary(d){
  if(!d||typeof d!=='object'||!Array.isArray(d.projects))return null;
  return {np:d.projects.length,
          nm:d.projects.reduce((s,pr)=>s+(((pr&&pr.materials)||[]).length),0)};
}
function restoreBackup(file){
  const rd=new FileReader();
  rd.onerror=()=>toast('파일을 읽지 못했습니다');
  rd.onload=()=>{
    let d=null;
    try{d=JSON.parse(rd.result);}catch(e){toast('백업 파일을 읽을 수 없습니다 (형식 오류)');return;}
    const sum=backupSummary(d);
    if(!sum){toast('이 파일은 이 앱의 백업 파일이 아닙니다');return;}
    const np=sum.np, nm=sum.nm;
    if(!confirm(`복원하면 지금 데이터를 덮어씁니다.\n\n복원할 내용\n· 현장 ${np}개\n· 마감재 ${nm}개\n\n되돌릴 수 있도록 지금 상태를 먼저 파일로 내려받습니다.\n\n복원할까요?`))return;
    if(!exportBackup(true)&&!confirm('현재 상태 백업에 실패했습니다.\n그래도 복원할까요? (지금 데이터는 되돌릴 수 없습니다)'))return;
    DB=d;
    DB.projects=DB.projects||[];DB.priceDB=DB.priceDB||[];
    DB.trades=DB.trades||DEFAULT_TRADES.slice();
    DB.company=Object.assign({},CO_DEFAULT,DB.company||{});
    DB.projects.forEach(pr=>{pr.estimates=pr.estimates||[];pr.contracts=pr.contracts||[];pr.materials=pr.materials||[];});
    syncPriceCats();
    state.tab='home';
    save();render();
    toast(`복원 완료 — 현장 ${np}개 · 마감재 ${nm}개`);
  };
  rd.readAsText(file);
}
function openBackup(){
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="width:min(460px,100%)"><h2>백업</h2>
    <div class="msub">파일로 보관해 두면 무슨 일이 있어도 되돌릴 수 있습니다.</div>
    <div style="padding:16px 22px;display:flex;flex-direction:column;gap:10px">
      <button class="btn green" id="bkExp">백업 파일로 내보내기</button>
      <button class="btn" id="bkImp">백업 파일에서 복원</button>
      <input type="file" id="bkFile" accept="application/json,.json" hidden>
      <div class="sub" style="line-height:1.65;margin-top:4px">복원은 지금 데이터를 <b>덮어씁니다</b>. 덮어쓰기 전 현재 상태를 자동으로 파일로 내려받으니, 잘못 복원해도 되돌릴 수 있습니다.</div>
    </div>
    <div class="modal-foot"><div class="right"><button class="btn" id="bkClose">닫기</button></div></div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('mousedown',e=>{if(e.target===ov)close();});
  ov.querySelector('#bkClose').onclick=close;
  ov.querySelector('#bkExp').onclick=()=>exportBackup();
  const f=ov.querySelector('#bkFile');
  ov.querySelector('#bkImp').onclick=()=>f.click();
  f.onchange=()=>{const file=f.files&&f.files[0];if(file){close();restoreBackup(file);}};
}

/* ===== theme ===== */
function applyTheme(t){if(t)document.documentElement.setAttribute('data-theme',t);
  const dark=(document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))==='dark';
  document.getElementById('themeBtn').innerHTML=svg(dark?IC.sun:IC.moon);}
function initTheme(){let t=null;try{t=localStorage.getItem(KEY+'-theme');}catch(e){}applyTheme(t||'light');
  document.getElementById('themeBtn').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');const n=cur==='dark'?'light':'dark';try{localStorage.setItem(KEY+'-theme',n);}catch(e){}applyTheme(n);};}

/* ===== init ===== */
document.getElementById('newProjBtn').onclick=newProject;
document.getElementById('saveNowBtn').onclick=saveNow;
document.getElementById('backupBtn').onclick=openBackup;
/* PWA — 홈 화면 설치형 앱 (https에서만 동작, 로컬 파일은 무시) */
if('serviceWorker' in navigator&&location.protocol==='https:'){addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
initTheme();
(async function boot(){
  try{const s=JSON.parse(localStorage.getItem(SES_KEY)||'null');if(s&&s.refresh_token)session=s;}catch(e){}
  if(session){
    try{
      if(Date.now()>session.exp){await refreshSession();}
      else{clearTimeout(refT);refT=setTimeout(refreshSession,Math.max(30000,session.exp-Date.now()));}
    }catch(e){}
  }
  if(session){await enterApp();}
  else{showLogin();}
})();
</script>
